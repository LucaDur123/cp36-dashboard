<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>3° Reggimento Alpini — CP Addestramento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#e8f0f7;color:#1a2e42}
#app-header button{padding:6px 16px;font-size:12px;font-weight:500;background:#5b9ec9;border:1px solid #4a8ab5;border-radius:20px;cursor:pointer;color:#fff;letter-spacing:0.3px;transition:background 0.15s,border-color 0.15s,box-shadow 0.15s;white-space:nowrap}
#app-header button.active{background:#1a5c8a;border-color:#0f3d5c;color:#fff;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
#app-header button:hover:not(.active){background:#4a8ab5;border-color:#3a7abf;color:#fff}
.accent{color:#fff}
main{padding:16px}
h2{font-size:16px;font-weight:bold;margin-bottom:12px;color:#1a3a5c}
.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
input,select{padding:5px 8px;font-size:12px;border:1px solid #a0bcd8;border-radius:6px;background:#fff;color:#1a2e42}
input:focus,select:focus{outline:none;border-color:#2a7abf}
.bp{padding:6px 16px;font-size:12px;background:#1a5c99;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.bp:hover{background:#1a4d80}
.bs{padding:3px 8px;font-size:11px;background:transparent;border:1px solid #2a7abf;color:#1a5c99;border-radius:4px;cursor:pointer}
.bs:hover{background:#ddeef8}
.bd{padding:1px 5px;font-size:10px;background:#fff0f0;border:1px solid #f09595;color:#a32d2d;border-radius:3px;cursor:pointer;margin-left:4px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#daeaf7;border-bottom:2px solid #a0c4e8}
thead th{vertical-align:bottom;text-align:center;padding:0;overflow:visible;white-space:nowrap}
thead th{vertical-align:bottom;text-align:center}
th{padding:7px 10px;text-align:left;font-weight:bold;color:#1a3a5c;font-size:11px}
tbody tr{border-bottom:1px solid #c8ddef}
tbody tr:nth-child(even){background:#f0f6fb}
tbody tr:hover{background:#daeaf7}
td{padding:6px 10px}
.card{background:#fff;border:1px solid #b8d4ec;border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,90,150,0.07)}
.cbody{padding:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold}
.ok{background:#d0ebd0;color:#1a5c1a}
.warn{background:#fce8c0;color:#7a4a00}
.exp{background:#fbd0d0;color:#7a1a1a}
.miss{background:#dde4ec;color:#3a5070}
.dot{width:16px;height:16px;border-radius:3px;display:inline-block}
.leg{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#4a6a88}
.av{width:42px;height:42px;border-radius:50%;background:#1a5c99;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:15px;color:#fff;flex-shrink:0}
.phdr{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border:1px solid #b8d4ec;border-radius:10px;margin-bottom:10px}
.bw{display:flex;align-items:center;gap:8px}
.bbg{flex:1;height:7px;background:#c8ddef;border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.ac{position:absolute;background:#fff;border:1px solid #a0c4e8;border-radius:6px;z-index:100;max-height:180px;overflow-y:auto;width:100%;top:100%;left:0;box-shadow:0 4px 12px rgba(26,90,150,0.15)}
.ac div{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #ddeef8}
.ac div:hover{background:#daeaf7}
.tsc{overflow-x:auto}
.inote{background:#ddeef8;border:1px solid #a0c4e8;border-radius:6px;padding:8px 12px;font-size:11px;color:#2a4a6a;margin-top:8px}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:860px}
.dash-name{cursor:pointer;color:#1a5c99;text-decoration:underline;font-weight:bold}
.dash-name:hover{color:#0d3d6e}
footer{text-align:center;padding:10px;font-size:10px;color:#7a9ab8;border-top:1px solid #c8ddef;margin-top:24px;background:#daeaf7}
@media(max-width:640px){.twocol{grid-template-columns:1fr}}

@media (max-width: 600px) {
  /* ── HEADER ── */
  #app-header > div:first-child {
    padding: 6px 10px;
    min-height: 48px;
  }
  #app-header > div:first-child span {
    font-size: 11px;
    padding: 0 6px;
  }
  #app-header > div:first-child img {
    height: 32px !important;
  }
  /* NAV buttons: wrap and scroll horizontally */
  #app-header > div:last-child {
    height: auto !important;
    padding: 4px 8px !important;
    gap: 4px !important;
    overflow-x: auto;
    flex-wrap: nowrap !important;
    -webkit-overflow-scrolling: touch;
  }
  #app-header button {
    padding: 5px 10px !important;
    font-size: 11px !important;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  main { padding: 8px !important; }
  h2 { font-size: 14px !important; margin-bottom: 8px !important; }

  /* ── DASHBOARD BANNER ── */
  #dash-banner {
    flex-direction: column !important;
    gap: 10px !important;
    padding: 10px 12px !important;
  }
  #dash-banner > div:nth-child(2) { display: none; } /* hide progress bar on mobile */

  /* ── FILTERS ── */
  .filters {
    flex-wrap: wrap;
    gap: 6px;
  }
  .filters input, .filters select {
    width: 100% !important;
    box-sizing: border-box;
  }

  /* ── DASHBOARD TABLE ──
     On mobile show only: #, Grado, Cognome Nome, status dots (scrollable) */
  .tsc {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tsc table {
    min-width: 700px !important;
    font-size: 10px !important;
  }

  /* ── CARDS ── */
  .card { border-radius: 6px; margin-bottom: 10px; }
  .cbody { padding: 10px !important; }

  /* ── INSERT FORM ── */
  #view-insert .card > .cbody > div[style*="grid"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* ── GESTIONE grid ── */
  #view-gestione > div {
    grid-template-columns: 1fr !important;
  }

  /* ── MODULO VIEW ── */
  #view-modulo .card table { font-size: 10px; }

  /* ── MODAL OVERLAY ── */
  #scheda-overlay > div {
    max-width: 100% !important;
    max-height: 95vh !important;
    border-radius: 8px !important;
  }
  #scheda-overlay table { font-size: 10px; }
  #scheda-overlay th, #scheda-overlay td { padding: 4px 5px !important; }

  /* ── STAMPA VIEW ── */
  #view-stampa table { font-size: 10px; }
  #view-stampa th, #view-stampa td { padding: 4px 5px; }

  /* ── PIANI DI LEZIONE ── */
  #view-piani .filters { flex-direction: column; }
  #view-piani .filters select,
  #view-piani .filters input { width: 100% !important; }

  /* ── FOOTER ── */
  footer { font-size: 9px !important; padding: 6px !important; }

  /* ── PRONTI OVERLAY ── */
  #pronti-overlay > div {
    width: 96% !important;
    max-height: 88vh !important;
  }
}
</style>
</head>

async function sbGet(table, params) {
  // Fetch all rows in one shot with high limit
  var url = SB_URL + "/rest/v1/" + table + "?order=id&limit=10000";
  if (params) url += "&" + params;
  var hdrs = Object.assign({}, sbHeaders(), {"Range-Unit": "items"});
  var r = await fetch(url, { headers: hdrs });
  if (!r.ok) throw new Error("SB GET " + table + " error: " + r.status);
  return r.json();
}

async function sbPost(table, data) {
  var r = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: sbHeaders(),
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("SB POST error: " + r.status);
}

async function sbPatch(table, id, data) {
  var r = await fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + id, {

    headers: sbHeaders(),
    body: JSON.stringify(data)
  });

}

function gradeRank(grado) {
  var g = (grado||"").toLowerCase().trim();
  // Normalize common acronyms before matching
  var norm = g
    .replace(/^sma$/,"serg. magg. a.")
    .replace(/^s\.m\.a\.?$/,"serg. magg. a.")
    .replace(/^smc$/,"serg. magg. ca")
    .replace(/^s\.m\.c\.?$/,"serg. magg. ca")
    .replace(/^s\.m\.$/,"serg. magg.")
    .replace(/^1°\s?grd$/,"1° grd")
    .replace(/^1°\s?lgt$/,"1° lgt")
    .replace(/^1°\s?mar$/,"1° mar");
  var toCheck = [norm, g];
  for(var j=0;j<toCheck.length;j++) {
    var v=toCheck[j];
    for(var i=0;i<GRADE_ORDER.length;i++){
      if(v===GRADE_ORDER[i]) return i;
    }
    for(var i=0;i<GRADE_ORDER.length;i++){
      if(v.indexOf(GRADE_ORDER[i])===0) return i;
    }
  }
  return GRADE_ORDER.length;
}

function sortPersonnel(arr) {
  return arr.slice().sort(function(a,b){
    var ra=gradeRank(a.grado), rb=gradeRank(b.grado);
    if(ra!==rb) return ra-rb;
    var ca=a.cognome||"", cb=b.cognome||"";
    return ca.localeCompare(cb,"it");
  });
}

function quickAddSave(pid, mod) {
  var dataRaw = ((document.getElementById("qa-data")||{}).value || "").trim();
  var luogoV  = (document.getElementById("qa-luogo")||{}).value || "";
  var per     = parseInt((document.getElementById("qa-per")||{}).value)||1;
  if(!dataRaw){alert("Inserisci la data.");return;}
  // Parse dd/mm/yyyy or yyyy-mm-dd
  var data = "";
  var mIT = dataRaw.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  var mISO = dataRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(mIT)  data = mIT[3]+"-"+("0"+mIT[2]).slice(-2)+"-"+("0"+mIT[1]).slice(-2);
  else if(mISO) data = dataRaw;
  else { alert("Formato data non valido. Usa gg/mm/aaaa (es. 15/03/2025)"); return; }
  // Basic validity check
  var dt = new Date(data);
  if(isNaN(dt.getTime())){ alert("Data non valida."); return; }
  var qSess={id:nextId++, pid:pid, modulo:mod, data:data, luogo:luogoV, periodi:per};
  sessions.push(qSess);
  save();
  (async function(){ try{ await sbPost("sessions", qSess); }catch(e){ console.error("SB error:",e); } })();
  var modal=document.getElementById("qa-modal"); if(modal) modal.remove();
  rSch(buildPS());
}

function addDays(d,n) {
  if(!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
  var dt = new Date(d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().split("T")[0];
}
function dd(d) {
  if(!d) return null;
  var dt=new Date(d), now=new Date(); now.setHours(0,0,0,0);
  return Math.round((dt-now)/86400000);
}
function fD(d) {
  if(!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return d||"\u2014";
  var p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0];
}
function luogo(s) { return(s&&s.luogo&&s.luogo.trim())?s.luogo.trim():"PINEROLO"; }
function today() { return new Date().toISOString().split("T")[0]; }
function todayIT() {
  var n=new Date(), mn=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  return n.getDate()+" "+mn[n.getMonth()]+" "+n.getFullYear();
}
function getExp(mod,last,fD2,pD) {
  if(!last||!/^\d{4}-\d{2}-\d{2}$/.test(last)) return null;
  var cfg=MC[mod]; if(!cfg) return null;
  if(mod==="form_specifica") return last;
  // PEFO special rule: valid for entire next calendar year
  if(mod==="pefo"||mod==="agilita") {
    var lastYear=parseInt(last.substring(0,4));
    // Expires at end of the year after the year of last session
    return (lastYear+1)+"-12-31";
  }
  var base=last;
  if(mod==="poligono"&&fD2&&pD) {
    var g=Math.round((new Date(fD2)-new Date(pD))/86400000);
    if(g>=0&&g<=180) base=fD2;
  }
  return addDays(base,cfg.g);
}
function getSt(exp) {
  if(!exp) return "missing";
  var d=dd(exp); if(d===null) return "missing";
  if(d<0) return "expired"; if(d<=60) return "warning"; return "ok";
}
function buildPS() {
  var map={};
  for(var i=0;i<personnel.length;i++) {
    var p=personnel[i], ms={};
    for(var j=0;j<MK.length;j++) {
      var mod=MK[j];
      var s=sessions.filter(function(x){return x.pid===p.id&&x.modulo===mod;}).sort(function(a,b){return b.data>a.data?1:-1;});
      var lat=s[0]||null;
      var tot=s.reduce(function(a,x){return a+(x.periodi||1);},0);
      var fS=sessions.filter(function(x){return x.pid===p.id&&x.modulo==="fats";}).sort(function(a,b){return b.data>a.data?1:-1;})[0];
      var pS=sessions.filter(function(x){return x.pid===p.id&&x.modulo==="poligono";}).sort(function(a,b){return b.data>a.data?1:-1;})[0];
      var exp=getExp(mod,lat?lat.data:null,fS?fS.data:null,pS?pS.data:null);
      ms[mod]={lat:lat,exp:exp,st:getSt(exp),tot:tot,hist:s};
    }
    map[p.id]=ms;
  }
  return map;
}
function dot(st,title) {
  var bg={ok:"#3B6D11",warning:"#BA7517",expired:"#A32D2D",missing:"#B4B2A9"};

}
function pill(st) {

function pctSch(pid,PS) {

  for(var i=0;i<SCHEDA.length;i++){var st=ms[SCHEDA[i].mod]&&ms[SCHEDA[i].mod].st;if(st==="ok"||st==="warning")done++;}
  return Math.round(done/SCHEDA.length*100);
}

  var filt = personnel.filter(function(p){
    return (!cpF||p.cp===cpF) && (!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);
  });

  var tbody = document.getElementById("dash-tbody");
  if(!tbody) return;

  // Precompute global rank (position in full sorted list)
  var _sortedAll = sortPersonnel(personnel);
  var _rankMap = {};
  _sortedAll.forEach(function(p,i){ _rankMap[p.id] = i+1; });

  // Build rows HTML
  var rowsHtml = filt.map(function(p,i){
    var ms   = PS[p.id]||{};
    var dots = MK.map(function(m){
      var st=(ms[m]&&ms[m].st)||"missing";
      var ex=ms[m]&&ms[m].exp;
      return '<td style="padding:2px 0;text-align:center;width:31px;min-width:31px;max-width:31px">'+dot(st,MC[m].label+": "+SL[st]+(ex?" / "+fD(ex):""))+"</td>";
    }).join("");
    var tr = document.createElement("tr");
    tr.style.background = i%2===0 ? "transparent" : "#f0f6fb";
    var nameTd = document.createElement("td");
    nameTd.style.cssText = "padding:3px 8px;font-weight:bold;max-width:108px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:#1a5c99;text-decoration:underline";
    nameTd.dataset.pid = p.id;
    nameTd.className = "dash-name";
    nameTd.textContent = p.cognome+" "+p.nome;
    var printBtn = '<button class="bs" data-pid="'+p.id+'" title="Stampa scheda">&#128424;</button>';
    tr.innerHTML = '<td style="padding:3px 4px;font-size:10px;color:#aaa">'+(_rankMap[p.id]||i+1)+'</td>'
      +'<td style="padding:3px 4px;color:#3a5070">'+p.cp+'</td>'
      +'<td style="padding:3px 4px;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#3a5070">'+p.grado+"</td>"
      +"<NAMECELL></NAMECELL>"+dots
      +'<td style="padding:2px 3px;text-align:center">'+printBtn+"</td>";
    tr.querySelector("NAMECELL").replaceWith(nameTd);
    return tr.outerHTML;
  }).join("");

  tbody.innerHTML = rowsHtml;

  var countEl = document.getElementById("dash-count");
  if(countEl) countEl.textContent = filt.length+" militari";
}

function goToScheda(pid) {
  var p=null; for(var i=0;i<personnel.length;i++) if(personnel[i].id===pid){p=personnel[i];break;}
  if(!p) return;
  _buildSchedaOverlay(pid, null);
}

function _buildSchedaOverlay(pid, expandedMod) {
  var p=null; for(var i=0;i<personnel.length;i++) if(personnel[i].id===pid){p=personnel[i];break;}
  if(!p) return;

  var ex=document.getElementById("scheda-overlay"); if(ex) ex.remove();
  var PS=buildPS(); var ms=PS[pid]||{};

  var tbody = document.createElement("tbody");

  MK.forEach(function(mod, mIdx) {
    var m=ms[mod]||{};
    var lu=m.lat?(m.lat.luogo&&m.lat.luogo.trim()?m.lat.luogo.trim():"PINEROLO"):"--";
    var d=m.exp?dd(m.exp):null;
    var ds=d!==null?'<span style="font-size:10px;color:'+SC[m.st||"missing"]+'">'+(d<0?"-"+Math.abs(d):"+"+d)+"gg</span>":"";
    var cls={"ok":"ok","warning":"warn","expired":"exp","missing":"miss"}[m.st||"missing"];
    var isExpanded = (mod === expandedMod);

    var modSessions = sessions.filter(function(s){return s.pid===pid&&s.modulo===mod;})
      .sort(function(a,b){return b.data>a.data?1:-1;});

    var totPeriodi = modSessions.reduce(function(acc,s){return acc+(s.periodi||1);},0);
    var nSess = modSessions.length;
    var expandIcon = nSess>0 ? (isExpanded?"▾":"▸") : "";
    var sessLabel = nSess>0 ? nSess+" sess. / "+totPeriodi+" per." : "--";

    // Main module row
    var tr=document.createElement("tr");
    tr.style.background=mIdx%2===0?"transparent":"#f0f6fb";
    tr.style.cursor=nSess>0?"pointer":"default";
    tr.dataset.mod=mod; tr.dataset.pid=pid;
    tr.className="scheda-mod-row";
    tr.innerHTML=
      '<td style="padding:5px 8px;font-weight:bold;font-size:12px;white-space:nowrap">'
        +'<span style="color:#5b9ec9;margin-right:4px;font-size:11px">'+expandIcon+'</span>'
        +MC[mod].label+'</td>'
      +'<td style="padding:5px 8px;font-size:11px;font-family:monospace">'+(m.lat?fD(m.lat.data):"--")+'</td>'
      +'<td style="padding:5px 8px;font-size:11px">'+lu+'</td>'
      +'<td style="padding:5px 8px;font-size:11px;text-align:center">'
        +'<span style="color:'+(nSess>0?"#1a5c99":"#aaa")+';font-weight:'+(nSess>0?"bold":"normal")+'">'+sessLabel+'</span>'
      +'</td>'
      +'<td style="padding:5px 8px;font-size:11px;font-family:monospace">'+(m.exp?fD(m.exp):"--")+" "+ds+'</td>'
      +'<td style="padding:5px 8px"><span class="badge '+cls+'">'+SL[m.st||"missing"]+'</span></td>'
      +'<td style="padding:5px 4px;text-align:center;white-space:nowrap"></td>';

    var agBtn=document.createElement("button");
    agBtn.className="bp qa-trigger"; agBtn.dataset.pid=pid; agBtn.dataset.mod=mod;
    agBtn.style.cssText="font-size:10px;padding:3px 8px";
    agBtn.textContent="+ Aggiungi";
    agBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      var thisPid = this.dataset.pid;
      var thisMod = this.dataset.mod;
      var overlay = document.getElementById("scheda-overlay");
      if(overlay) overlay.remove();
      openQuickAdd(thisPid, thisMod);
    });
    tr.lastElementChild.appendChild(agBtn);

    // Direct click listener on row to expand/collapse
    (function(currentMod, currentTr, hasSess) {
      currentTr.addEventListener("click", function(e) {
        e.stopPropagation();
        if(e.target.closest(".qa-trigger") || e.target.closest(".del-sess-btn")) return;
        if(hasSess) _buildSchedaOverlay(pid, expandedMod===currentMod ? null : currentMod);
      });
    })(mod, tr, nSess>0);

    tbody.appendChild(tr);

    // Expanded session rows
    if(isExpanded && nSess>0) {
      modSessions.forEach(function(sess, si) {
        var str=document.createElement("tr");
        str.style.cssText="background:#e8f4fc;border-left:4px solid #5b9ec9";
        var sessDate=fD(sess.data);
        var luogoS=sess.luogo&&sess.luogo.trim()?sess.luogo.trim():"PINEROLO";
        var periodi=sess.periodi||1;
        str.innerHTML=
          '<td style="padding:4px 8px 4px 24px;font-size:11px" colspan="2">'
            +'<b style="color:#1a3a5c">'+(si+1)+'.&nbsp;</b>'
            +'<span style="font-family:monospace">'+sessDate+'</span>'
          +'</td>'
          +'<td style="padding:4px 8px;font-size:11px;color:#3a6a9a">'+luogoS+'</td>'
          +'<td style="padding:4px 8px;font-size:11px;text-align:center">'
            +'<span style="background:#daeaf7;color:#1a3a5c;border-radius:4px;padding:1px 7px;font-weight:bold">'+periodi+' per.</span>'
          +'</td>'
          +'<td colspan="2" style="padding:4px 8px;font-size:10px;color:#7a9ab8;font-style:italic">'
            +(si===0?'<span style="color:#1a7a3a;font-style:normal;font-size:10px">&#10003; ultima</span>':'')
          +'</td>'
          +'<td style="padding:4px 4px;text-align:center"></td>';

        var delBtn=document.createElement("button");
        delBtn.className="del-sess-btn";
        delBtn.dataset.sessId=sess.id; delBtn.dataset.pid=pid; delBtn.dataset.mod=mod;
        delBtn.style.cssText="font-size:10px;padding:2px 8px;background:#fff0f0;color:#c0392b;border:1px solid #e8b4b4;border-radius:4px;cursor:pointer;font-weight:bold";
        delBtn.textContent="\u2715 Elimina";

        delBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          var sid=parseInt(this.dataset.sessId);
          var thisPid=this.dataset.pid;
          var thisMod=this.dataset.mod;
          if(!confirm("Eliminare questa sessione?")) return;
          sessions=sessions.filter(function(s){return s.id!==sid;});
          save();
          (async function(){try{await sbDelete("sessions","id=eq."+sid);}catch(e2){console.error("SB:",e2);}})();
          _refreshDashRows(buildPS());
          _buildSchedaOverlay(thisPid, thisMod);
        });

        str.lastElementChild.appendChild(delBtn);
        tbody.appendChild(str);
      });

      // Total row
      var totRow=document.createElement("tr");
      totRow.style.cssText="background:#d0eaf7;border-left:4px solid #1a5c99";
      totRow.innerHTML=
        '<td colspan="3" style="padding:3px 8px 3px 24px;font-size:11px;font-weight:bold;color:#1a3a5c">Totale</td>'
        +'<td style="padding:3px 8px;font-size:11px;text-align:center;font-weight:bold;color:#1a3a5c">'
          +nSess+' sessioni / '+totPeriodi+' periodi'
        +'</td>'
        +'<td colspan="3"></td>';
      tbody.appendChild(totRow);
    }
  });

  // Build overlay
  var overlay=document.createElement("div");
  overlay.id="scheda-overlay";
  overlay.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,40,80,0.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box";

  var modal=document.createElement("div");
  modal.style.cssText="background:#fff;border-radius:12px;width:100%;max-width:1000px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(10,40,80,0.3)";

  var hdr=document.createElement("div");
  hdr.style.cssText="background:#1a3a5c;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0;flex-shrink:0";
  var title=document.createElement("div");
  title.style.cssText="color:#fff;font-weight:bold;font-size:15px";
  title.textContent=p.grado+" "+p.cognome+" "+p.nome+" \u2014 CP "+p.cp;
  var btns=document.createElement("div");
  btns.style.cssText="display:flex;gap:8px";
  var printBtn=document.createElement("button");
  printBtn.style.cssText="padding:5px 12px;font-size:12px;background:#5b9ec9;color:#fff;border:none;border-radius:5px;cursor:pointer";
  printBtn.innerHTML="&#128424; Stampa";
  printBtn.addEventListener("click",function(){openPrint(pid);});
  var closeBtn=document.createElement("button");
  closeBtn.style.cssText="background:transparent;border:none;color:#a8d4f0;font-size:22px;cursor:pointer;padding:0 4px;line-height:1";
  closeBtn.innerHTML="&times;";
  closeBtn.addEventListener("click",function(){overlay.remove();});
  btns.appendChild(printBtn); btns.appendChild(closeBtn);
  hdr.appendChild(title); hdr.appendChild(btns);

  var hint=document.createElement("div");
  hint.style.cssText="background:#f0f6fb;padding:6px 18px;font-size:11px;color:#4a6a88;border-bottom:1px solid #c8ddef;flex-shrink:0";
  hint.textContent="Clicca su una riga per vedere le sessioni e i periodi. Usa + Aggiungi per inserire una nuova sessione.";

  var body=document.createElement("div");
  body.style.cssText="overflow-y:auto;padding:0;flex:1";
  var tbl=document.createElement("table");
  tbl.style.cssText="width:100%;border-collapse:collapse";
  var thead=document.createElement("thead");
  thead.innerHTML='<tr style="background:#daeaf7;border-bottom:2px solid #a0c4e8;position:sticky;top:0">'
    +'<th style="padding:7px 8px;text-align:left;font-size:11px">Modulo</th>'
    +'<th style="padding:7px 8px;font-size:11px;text-align:center">Ultima sessione</th>'
    +'<th style="padding:7px 8px;font-size:11px">Luogo</th>'
    +'<th style="padding:7px 8px;font-size:11px;text-align:center">Sessioni / Periodi</th>'
    +'<th style="padding:7px 8px;font-size:11px;text-align:center">Scade il</th>'
    +'<th style="padding:7px 8px;font-size:11px;text-align:center">Stato</th>'
    +'<th style="padding:7px 8px;font-size:11px"></th>'
    +'</tr>';
  tbl.appendChild(thead);
  tbl.appendChild(tbody);
  body.appendChild(tbl);

  modal.appendChild(hdr);
  modal.appendChild(hint);
  modal.appendChild(body);
  overlay.appendChild(modal);

  overlay.addEventListener("click",function(e){
    if(e.target===overlay){overlay.remove();return;}
  });

  document.body.appendChild(overlay);

  if(expandedMod){
    setTimeout(function(){
      var rows=tbody.querySelectorAll(".scheda-mod-row");
      rows.forEach(function(r){
        if(r.dataset.mod===expandedMod) r.scrollIntoView({block:"nearest",behavior:"smooth"});
      });
    },50);
  }
}

function showPronti() {
  var PS = buildPS();
  var schedaMods = SCHEDA.map(function(r){return r.mod;});
  var prontiList = personnel.filter(function(p){
    var ms = PS[p.id]||{};
    for(var j=0;j<schedaMods.length;j++){var st=ms[schedaMods[j]]&&ms[schedaMods[j]].st;if(st!=="ok"&&st!=="warning")return false;}
    return true;
  });

  var rows = prontiList.map(function(p,i){
    var bg = i%2===0?"transparent":"#fafafa";
    var tr = document.createElement("tr");
    tr.style.background = bg;
    tr.innerHTML = "<td>"+p.cp+"</td><td>"+p.grado+"</td>"
      +"<td style='font-weight:bold'><span class='lnk-scheda' data-pid='"+p.id+"' style='cursor:pointer;color:#1a5c99;text-decoration:underline'>"+p.cognome+" "+p.nome+"</span></td>"
      +"<td style='text-align:center'><button class='bs lnk-print' data-pid='"+p.id+"'>&#128424;</button></td>";
    return tr.outerHTML;
  }).join("");

  var overlay = document.createElement("div");
  overlay.id = "pronti-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,40,80,0.55);z-index:1000;display:flex;align-items:center;justify-content:center";
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(10,40,80,0.3)">'
    +'<div style="padding:16px 20px;border-bottom:1px solid #b8d4ec;background:#1a3a5c;color:#fff;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0">'
    +'<div><b style="font-size:16px;color:#fff">Personale pronto</b> <span style="color:#a8d4f0;font-size:13px">('+prontiList.length+' / '+personnel.length+' militari)</span></div>'
    +'<button id="pronti-close" style="background:transparent;border:none;font-size:20px;cursor:pointer;color:#a8d4f0">&times;</button>'
    +'</div>'
    +'<div style="overflow-y:auto;padding:0">'
    +'<table><thead><tr><th>CP</th><th>Grado</th><th>Cognome Nome</th><th></th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'</div>'
    +'</div>';
  overlay.addEventListener("click", function(e){
    if(e.target===overlay) { overlay.remove(); return; }
    if(e.target.id==="pronti-close") { overlay.remove(); return; }
    var scheda = e.target.closest(".lnk-scheda");
    if(scheda){ overlay.remove(); goToScheda(scheda.dataset.pid); return; }
    var prnt = e.target.closest(".lnk-print");
    if(prnt){ openPrint(prnt.dataset.pid); return; }
  });
  document.body.appendChild(overlay);

  // click handled by permanent listener set at init
}

var iPids=[];
function rIns() {
  // On first call build full layout; on subsequent calls only refresh the list + counter
  var viewEl = el("view-insert");
  if(!viewEl.dataset.built) {
    _rInsLayout();
    viewEl.dataset.built = "1";
  }
  _rInsList();
}

function _rInsLayout() {
  var mOpts = MK.map(function(m){return'<option value="'+m+'">'+MC[m].label+"</option>";}).join("");
  var cpL = [...new Set(personnel.map(function(p){return p.cp;}))].sort();
  var cpOpts = cpL.map(function(c){return'<option value="'+c+'">'+c+"</option>";}).join("");

    +'<b style="display:block;margin-bottom:12px;font-size:14px;color:#1a3a5c">1. Dati del modulo</b>'
    +'<div style="display:grid;grid-template-columns:2fr 1fr 2fr 1fr;gap:12px;align-items:end">'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Modulo</label><select id="ins-mod" style="width:100%"><option value="">-- seleziona --</option>'+mOpts+"</select></div>"
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Data</label><input type="date" id="ins-data" value="'+today()+'" style="width:100%"></div>'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Luogo (vuoto = PINEROLO)</label><input id="ins-luogo" placeholder="es. TAVERNETTE" style="width:100%"></div>'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">N. periodi</label><input type="number" id="ins-per" value="1" min="1" style="width:100%"></div>'
    +'</div></div></div>'

    +'<div class="card" style="max-width:1000px;margin-bottom:14px"><div class="cbody">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<b style="font-size:14px;color:#1a3a5c">2. Militari partecipanti</b>'
    +'<div style="display:flex;gap:6px">'
    +'<button id="ins-btn-all" style="padding:2px 8px;font-size:11px;border:1px solid #a0bcd8;background:#fff;border-radius:5px;cursor:pointer;color:#1a3a5c">Tutti</button>'
    +'<button id="ins-btn-none" style="padding:2px 8px;font-size:11px;border:1px solid #a0bcd8;background:#fff;border-radius:5px;cursor:pointer;color:#1a3a5c">Nessuno</button>'
    +'</div></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'

    +'<div style="max-width:1000px">'

    if(row) tPid(row.dataset.pid);
  });

  document.getElementById("ins-btn-all").addEventListener("click", function(){
    var rows = listEl.querySelectorAll(".ins-row");

  });

  document.getElementById("ins-btn-none").addEventListener("click", function(){
    iPids = [];
    _rInsRefresh();
  });

  qEl.addEventListener("input", function(){ _rInsFilter(); });
  cpEl.addEventListener("change", function(){ _rInsFilter(); });

  _rInsRefresh();
}

function tPid(pid){
  var i = iPids.indexOf(pid);
  if(i >= 0) iPids.splice(i, 1);
  else iPids.push(pid);
  _rInsRefresh();
}

function selAll(){
  var listEl = document.getElementById("ins-list");
  if(!listEl) return;
  var rows = listEl.querySelectorAll(".ins-row");
  rows.forEach(function(r){ if(r.style.display!=="none" && iPids.indexOf(r.dataset.pid)<0) iPids.push(r.dataset.pid); });
  _rInsRefresh();
}

// Filter rows by show/hide - never touches innerHTML
function _rInsFilter() {
  var q   = (document.getElementById("ins-q").value || "").toLowerCase();
  var cpF = document.getElementById("ins-cp").value || "";

function doIns(){
  var mod=val("ins-mod"),data=val("ins-data"),lg=val("ins-luogo"),per=parseInt(val("ins-per"))||1;
  var pianoLink=(val("ins-piano-link")||"").trim();
  var pianoNote=(val("ins-piano-note")||"").trim();
  if(!mod||!data||iPids.length===0){alert("Seleziona modulo, data e almeno un militare.");return;}
  var n=iPids.length;
  var newSessions=[];
  for(var i=0;i<iPids.length;i++){
    var sess={id:nextId++,pid:iPids[i],modulo:mod,data:data,luogo:lg,periodi:per};
    sessions.push(sess); newSessions.push(sess);
  }
  var newPiano=null;
  if(pianoLink){
    var newPianoId=pianiData.length>0?Math.max.apply(null,pianiData.map(function(p){return p.id||0;}))+1:1;

function rMod(PS){
  var mod=val("mod-sel")||"mcm", cpF=val("mod-cp");
  var cpL=[...new Set(personnel.map(function(p){return p.cp;}))].sort();
  var mO=MK.map(function(m){return'<option value="'+m+'"'+(mod===m?" selected":"")+">"+MC[m].label+"</option>";}).join("");
  var cpO=cpL.map(function(c){return'<option value="'+c+'"'+(cpF===c?" selected":"")+">CP "+c+"</option>";}).join("");
  var rows=personnel.filter(function(p){return!cpF||p.cp===cpF;}).map(function(p){var m=PS[p.id]&&PS[p.id][mod]||{};return{p:p,lat:m.lat,exp:m.exp,st:m.st||"missing",tot:m.tot||0};});
  rows.sort(function(a,b){var o={expired:0,missing:1,warning:2,ok:3};return(o[a.st]||0)-(o[b.st]||0);});
  var totP=sessions.filter(function(s){return s.modulo===mod;}).reduce(function(a,s){return a+(s.periodi||1);},0);
  var cnt={ok:0,warning:0,expired:0,missing:0};

    return'<tr style="background:'+(i%2===0?"transparent":"#fafafa")+'"><td>'+r.p.cp+"</td><td>"+r.p.grado+'</td><td style="font-weight:bold">'+r.p.cognome+" "+r.p.nome+"</td><td style='font-family:monospace'>"+(r.lat?fD(r.lat.data):"--")+"</td><td>"+(r.lat?luogo(r.lat):"--")+"</td><td style='font-family:monospace'>"+(r.exp?fD(r.exp):"--")+" "+ds+"</td><td>"+pill(r.st||"missing")+"</td><td style='text-align:center'>"+(r.tot||"--")+"</td></tr>";
  }).join("");

    +'<div class="filters"><select id="mod-sel" onchange="rMod(buildPS())">'+mO+'</select><select id="mod-cp" onchange="rMod(buildPS())"><option value="">Tutte CP</option>'+cpO+"</select></div>"
    +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">'
    +[["ok","Validi"],["warning","In scad."],["expired","Scaduti"],["missing","Mancanti"]].map(function(x){return'<div style="padding:10px;background:'+ST_BG[x[0]]+';border-radius:8px;border:1px solid '+SC[x[0]]+'44"><div style="font-size:10px;color:'+SC[x[0]]+';font-weight:bold">'+x[1]+'</div><div style="font-size:22px;font-weight:bold;color:'+SC[x[0]]+'">'+cnt[x[0]]+"</div></div>";}).join("")
    +'<div style="padding:10px;background:#daeaf7;border-radius:8px;border:1px solid #a0c4e8"><div style="font-size:10px;color:#2a4a6a;font-weight:bold">Tot. periodi</div><div style="font-size:22px;font-weight:bold">'+totP+"</div></div></div>"
    +'<div class="card"><table><thead><tr><th>CP</th><th>Grado</th><th>Cognome Nome</th><th>Ultima sessione</th><th>Luogo</th><th>Scade il</th><th>Stato</th><th>Periodi</th></tr></thead><tbody>'+tb+"</tbody></table></div>";

  }).sort(function(a,b){return(b.data||"")>(a.data||"")?1:-1;});

    +'<div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap">'

    +'<input id="piani-filter-q" placeholder="Cerca titolo, note, data..." style="width:220px">'
    +'<span style="font-size:11px;color:#7a9ab8">'+filtered.length+" di "+pianiData.length+" piani</span>"

  _bindSearch("piani-filter-q","piani",function(){rPiani();});
  _bindSelect("piani-filter-mod",function(){rPiani();});

  if(tbl)tbl.addEventListener("click",function(e){
    var btn=e.target.closest(".piani-del");

function addPiano(){
  var mod=val("piani-mod"),data=val("piani-data"),titolo=(val("piani-titolo")||"").trim();
  var link=(val("piani-link")||"").trim(),note=(val("piani-note")||"").trim();
  if(!mod||!data){alert("Seleziona almeno il modulo e la data.");return;}
  var newId=pianiData.length>0?Math.max.apply(null,pianiData.map(function(p){return p.id||0;}))+1:1;
  var newPianoRec={id:newId,modulo:mod,data:data,titolo:titolo,link:link,note:note};
  pianiData.push(newPianoRec);
  savePiani();
  (async function(){try{await sbPost("piani",newPianoRec);}catch(e){console.error("SB error:",e);}})();
  el("piani-ok").style.display="block";
  setTimeout(function(){el("piani-ok").style.display="none";},2000);
  rPiani();
}
function delPiano(id){
  if(!confirm("Eliminare questo piano di lezione?"))return;
  pianiData=pianiData.filter(function(p){return p.id!==id;});
  savePiani();
  (async function(){try{await sbDelete("piani","id=eq."+id);}catch(e){console.error("SB error:",e);}})();
  rPiani();
}

/* GESTIONE */
function rGest(){
  var delIds=window._gestDelIds||[];
  var cpL=[...new Set(personnel.map(function(p){return p.cp;}))].sort();
  var cpF=(document.getElementById("gest-filter-cp")&&document.getElementById("gest-filter-cp").value)||"";
  var q=(_qStore.gestQ||"").toLowerCase();
  var filtP=sortPersonnel(personnel).filter(function(p){return(!cpF||p.cp===cpF)&&(!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);});
  var cpOpts=cpL.map(function(c){return'<option value="'+c+'"'+(cpF===c?" selected":"")+">CP "+c+"</option>";}).join("");
  var listRows=filtP.map(function(p){
    var sel=delIds.indexOf(p.id)>=0;
    var div=document.createElement("div");
    div.dataset.pid=p.id;div.className="gest-row";
    div.style.cssText="padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;background:"+(sel?"#FCEBEB":"#fff")+";border-bottom:1px solid #c8ddef";
    div.innerHTML='<div style="width:13px;height:13px;border-radius:3px;border:1px solid '+(sel?"#A32D2D":"#ccc")+';background:'+(sel?"#A32D2D":"transparent")+';flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">'+(sel?"&#10003;":"")+"</div>"
      +'<span style="font-weight:'+(sel?"bold":"normal")+';color:'+(sel?"#A32D2D":"inherit")+'">'+p.cognome+" "+p.nome+"</span>"
      +'<span style="margin-left:auto;font-size:10px;color:#7a9ab8">'+p.grado+" CP"+p.cp+"</span>";
    return div.outerHTML;
  }).join("");
  el("view-gestione").innerHTML=
    "<h2>Gestione personale</h2>"
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px">'
    +'<div><div class="card"><div class="cbody">'
    +'<b style="display:block;margin-bottom:12px;font-size:14px;color:#1a3a5c">Aggiungi militare</b>'
    +[["Cognome","gcog","COGNOME"],["Nome","gnom","Nome"],["Grado","ggra","es. Alp VFI"],["CP","gcp","es. 36"],["Posizione","gpos","es. STRADE SICURE"],["PL","gpl","es. MAR 26"]].map(function(x){return'<label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">'+x[0]+'</label><input id="'+x[1]+'" placeholder="'+x[2]+'" style="width:100%;margin-bottom:10px">';}).join("")
    +'<button class="bp" onclick="addP()" style="width:100%">+ Aggiungi</button>'
    +'</div></div>'
    +'<div class="inote" style="margin-top:8px">Totale militari: <b>'+personnel.length+"</b></div></div>"
    +'<div><div class="card"><div class="cbody">'
    +'<b style="display:block;margin-bottom:10px;font-size:14px;color:#A32D2D">Elimina militari</b>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center">'
    +'<input id="gest-filter-q" placeholder="Cerca cognome..." style="width:160px" autocomplete="off">'
    +'<select id="gest-filter-cp"><option value="">Tutte CP</option>'+cpOpts+"</select>"
    +'<button onclick="gestSelAll()" style="padding:2px 8px;font-size:11px;border:1px solid #a0bcd8;background:#fff;border-radius:5px;cursor:pointer;color:#1a3a5c">Tutti</button>'
    +'<button onclick="gestSelNone()" style="padding:2px 8px;font-size:11px;border:1px solid #a0bcd8;background:#fff;border-radius:5px;cursor:pointer;color:#1a3a5c">Nessuno</button>'
    +'</div>'
    +'<div id="gest-list" style="max-height:340px;overflow-y:auto;border:1px solid #c8ddef;border-radius:6px;margin-bottom:10px">'+listRows+'</div>'
    +'<button id="gest-del-btn" onclick="gestDelSelected()" style="width:100%;padding:9px;font-size:13px;font-weight:bold;background:#A32D2D;color:#fff;border:none;border-radius:6px;cursor:pointer;opacity:'+(delIds.length>0?1:0.4)+'"'+(delIds.length===0?' disabled':'')+'>&#10005; Elimina '+delIds.length+' militare/i selezionati</button>'
    +'</div></div></div>'
    +'</div>';
  var listEl=document.getElementById("gest-list");
  if(listEl)listEl.addEventListener("click",function(e){
    var row=e.target.closest(".gest-row");
    if(!row)return;
    var pid=row.dataset.pid,idx=delIds.indexOf(pid);
    if(idx>=0)delIds.splice(idx,1);else delIds.push(pid);
    window._gestDelIds=delIds;rGest();
  });
  var qEl=document.getElementById("gest-filter-q");
  var cpEl=document.getElementById("gest-filter-cp");
  if(qEl){qEl.value=_qStore.gestQ||"";if(!qEl.dataset.bound){qEl.dataset.bound="1";qEl.addEventListener("input",function(){_qStore.gestQ=this.value;rGest();});}}
  if(cpEl&&!cpEl.dataset.bound){cpEl.dataset.bound="1";cpEl.addEventListener("change",function(){rGest();});}
}
function gestSelAll(){
  var cpF=(document.getElementById("gest-filter-cp")&&document.getElementById("gest-filter-cp").value)||"";
  var q=(_qStore.gestQ||"").toLowerCase();
  window._gestDelIds=personnel.filter(function(p){return(!cpF||p.cp===cpF)&&(!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);}).map(function(p){return p.id;});
  rGest();
}
function gestSelNone(){window._gestDelIds=[];rGest();}
function gestDelSelected(){
  var delIds=window._gestDelIds||[];
  if(delIds.length===0)return;
  var names=delIds.map(function(id){var p=personnel.find(function(x){return x.id===id;});return p?p.grado+" "+p.cognome+" "+p.nome:"";}).join("\n");
  if(!confirm("Eliminare definitivamente "+delIds.length+" militare/i?\n\n"+names+"\n\nATTENZIONE: verranno eliminate anche tutte le sessioni associate."))return;
  var toDelete=delIds.slice();
  personnel=personnel.filter(function(p){return toDelete.indexOf(p.id)<0;});
  sessions=sessions.filter(function(s){return toDelete.indexOf(s.pid)<0;});
  window._gestDelIds=[];save();
  (async function(){try{for(var i=0;i<toDelete.length;i++){await sbDelete("sessions","pid=eq."+toDelete[i]);await sbDelete("personnel","id=eq."+toDelete[i]);}}catch(e){console.error("SB error:",e);}})();
  rGest();
}
function addP(){
  var cog=(val("gcog")||"").trim().toUpperCase(),nom=(val("gnom")||"").trim(),gra=(val("ggra")||"").trim(),cp=(val("gcp")||"36").trim(),pos=(val("gpos")||"").trim(),pl=(val("gpl")||"").trim();
  if(!cog||!nom||!gra){alert("Cognome, nome e grado sono obbligatori.");return;}
  var nId=String(Math.max.apply(null,personnel.map(function(x){return Number(x.id)||0;}))+1);
  var newP={id:nId,cp:cp,grado:gra,cognome:cog,nome:nom,pl:pl,posizione:pos};
  personnel.push(newP); personnel=sortPersonnel(personnel); save();
  (async function(){try{await sbPost("personnel",newP);}catch(e){console.error("SB error:",e);}})();
  alert("Militare aggiunto.");rGest();
}

  setTimeout(function(){var d=document.getElementById("qa-data");if(d){var n=new Date();d.value=("0"+n.getDate()).slice(-2)+"/"+("0"+(n.getMonth()+1)).slice(-2)+"/"+n.getFullYear();d.focus();d.select();}},50);

function quickAddSave(pid,mod){
  var dataRaw=((document.getElementById("qa-data")||{}).value||"").trim();
  var luogoV=(document.getElementById("qa-luogo")||{}).value||"";
  var per=parseInt((document.getElementById("qa-per")||{}).value)||1;
  if(!dataRaw){alert("Inserisci la data.");return;}
  var data="";
  var mIT=dataRaw.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  var mISO=dataRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(mIT)data=mIT[3]+"-"+("0"+mIT[2]).slice(-2)+"-"+("0"+mIT[1]).slice(-2);
  else if(mISO)data=dataRaw;
  else{alert("Formato data non valido. Usa gg/mm/aaaa");return;}
  var dt=new Date(data);if(isNaN(dt.getTime())){alert("Data non valida.");return;}
  var qSess={id:nextId++,pid:pid,modulo:mod,data:data,luogo:luogoV,periodi:per};
  sessions.push(qSess);save();
  (async function(){try{await sbPost("sessions",qSess);}catch(e){console.error("SB error:",e);}})();
  var modal=document.getElementById("qa-modal");if(modal)modal.remove();
  // Refresh the scheda overlay if open
  var overlay=document.getElementById("scheda-overlay");if(overlay){overlay.remove();goToScheda(pid);}
  _refreshDashBanner(buildPS());_refreshDashRows(buildPS());
}

function esportaExcel() {
  var PS = buildPS();
  var today = new Date();
  var todayStr = ("0"+today.getDate()).slice(-2)+"/"+("0"+(today.getMonth()+1)).slice(-2)+"/"+today.getFullYear();

  var sorted = sortPersonnel(personnel);

  function fmtDate(d) {
    if(!d) return ""; var pp=d.split("-");
    return pp.length===3 ? pp[2]+"/"+pp[1]+"/"+pp[0] : d;
  }
  function getLatest(pid, mod) {
    return sessions.filter(function(s){ return s.pid===pid && s.modulo===mod; })
      .sort(function(a,b){ return b.data>a.data?1:-1; })[0] || null;
  }

  // Status colors
  var BG  = {ok:"#C8E6C9", warning:"#FFF9C4", expired:"#FFCDD2", missing:"#ECEFF1"};
  var FG  = {ok:"#1B5E20", warning:"#E65100", expired:"#B71C1C", missing:"#546E7A"};

  // Build HTML table
  var th = function(txt, style) {
    return '<th style="'+style+'">'+txt+'</th>';
  };
  var td = function(txt, style) {
    return '<td style="'+style+'">'+txt+'</td>';
  };

  var BASE_HDR = "background:#1A3A5C;color:#fff;font-weight:bold;font-family:Arial;font-size:9pt;text-align:center;border:1px solid #0F2A44;padding:4px 6px;white-space:nowrap;vertical-align:bottom";
  var SUB_HDR  = "background:#BDD9EF;color:#1A3A5C;font-weight:bold;font-family:Arial;font-size:8pt;text-align:center;border:1px solid #7AAED0;padding:3px 4px";
  var FIX_HDR  = "background:#1E5080;color:#fff;font-weight:bold;font-family:Arial;font-size:9pt;text-align:center;border:1px solid #0F2A44;padding:4px 6px";

  // Title row
  var totalCols = 4 + MK.length * 2;
  var html = '<table border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse;font-family:Arial;font-size:9pt">';

  // Row 1: Title
  html += '<tr><td colspan="'+totalCols+'" style="background:#1A3A5C;color:#fff;font-weight:bold;font-size:13pt;text-align:center;padding:8px;border:2px solid #0F2A44">LENZUOLO PERENNE &mdash; 3&deg; REGGIMENTO ALPINI &mdash; 36^ Cp &mdash; '+todayStr+'</td></tr>';

  // Row 2: fixed headers (rowspan=2) + module names (colspan=2 each)
  html += '<tr>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:35px">N&deg;</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:55px">CP</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:90px">GRADO</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:200px;text-align:left;padding-left:8px">COGNOME E NOME</th>';
  MK.forEach(function(m) {
    html += '<th colspan="2" style="'+BASE_HDR+';min-width:90px"><div style="writing-mode:vertical-lr;transform:rotate(180deg);height:70px;font-size:8pt;display:inline-block;line-height:1.2">'+MC[m].label+'</div></th>';
  });
  html += '</tr>';

  // Row 3: LUOGO/DATA sub-headers
  html += '<tr>';
  MK.forEach(function() {
    html += '<th style="'+SUB_HDR+'">Luogo</th>';
    html += '<th style="'+SUB_HDR+'">Data</th>';
  });
  html += '</tr>';

  // Data rows
  sorted.forEach(function(p, ri) {
    var ms = PS[p.id] || {};
    var bg = ri%2===0 ? "#FFFFFF" : "#EBF5FB";
    html += '<tr style="background:'+bg+'">';
    html += td(ri+1, "font-family:Arial;font-size:9pt;text-align:center;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td("CP "+p.cp, "font-family:Arial;font-size:9pt;text-align:center;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td(p.grado, "font-family:Arial;font-size:9pt;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td(p.cognome+" "+p.nome, "font-family:Arial;font-size:9pt;font-weight:bold;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    MK.forEach(function(mod) {
      var s   = getLatest(p.id, mod);
      var st  = (ms[mod]&&ms[mod].st)||"missing";
      var cbg = BG[st], cfg = FG[st];
      var luogo = s ? (s.luogo&&s.luogo.trim()?s.luogo.trim():"PINEROLO") : "";
      var data  = s ? fmtDate(s.data) : "";
      var cell  = "font-family:Arial;font-size:8pt;text-align:center;border:1px solid #B0C8DC;padding:3px 4px;background:"+cbg+";color:"+cfg;
      html += td(luogo, cell);
      html += td(data, cell+(data?";font-weight:bold":""));
    });
    html += '</tr>';
  });

  // Legend row
  html += '<tr>';
  html += '<td colspan="2" style="padding:4px;border:none"></td>';
  html += '<td style="font-family:Arial;font-size:9pt;font-weight:bold;padding:5px 8px;border:1px solid #ccc">LEGENDA:</td>';
  [["#C8E6C9","#1B5E20","Valido"],["#FFF9C4","#E65100","In scad. \u226460gg"],["#FFCDD2","#B71C1C","Scaduto"],["#ECEFF1","#546E7A","Non effettuato"]].forEach(function(l){
    html += '<td colspan="2" style="background:'+l[0]+';color:'+l[1]+';font-family:Arial;font-size:9pt;font-weight:bold;text-align:center;border:1px solid #ccc;padding:4px 8px">'+l[2]+'</td>';
  });
  html += '<td colspan="'+(totalCols-10)+'" style="border:none"></td></tr>';

  html += '</table>';

  // Create downloadable .xls file (Excel reads HTML tables natively)
  var blob = new Blob([
    '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">',
    '<head><meta charset="UTF-8">',
    '<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>',
    '<x:Name>Lenzuolo Perenne</x:Name>',
    '<x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>',
    '</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->',
    '</head><body>',
    html,
    '</body></html>'
  ], {type: "application/vnd.ms-excel;charset=utf-8"});

  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "LENZUOLONE EXCEL.xls";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
