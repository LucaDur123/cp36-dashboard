<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>3° Reggimento Alpini — CP Addestramento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#e8f0f7;color:#1a2e42}
#app-header button{padding:6px 16px;font-size:12px;font-weight:500;background:#5b9ec9;border:1px solid #4a8ab5;border-radius:20px;cursor:pointer;color:#fff;letter-spacing:0.3px;transition:background 0.15s,border-color 0.15s,box-shadow 0.15s;white-space:nowrap}
#app-header button.active{background:#1a5c8a;border-color:#0f3d5c;color:#fff;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
#app-header button:hover:not(.active){background:#4a8ab5;border-color:#3a7abf;color:#fff}
.accent{color:#fff}
main{padding:16px}
h2{font-size:16px;font-weight:bold;margin-bottom:12px;color:#1a3a5c}
.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
input,select{padding:5px 8px;font-size:12px;border:1px solid #a0bcd8;border-radius:6px;background:#fff;color:#1a2e42}
input:focus,select:focus{outline:none;border-color:#2a7abf}
.bp{padding:6px 16px;font-size:12px;background:#1a5c99;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.bp:hover{background:#1a4d80}
.bs{padding:3px 8px;font-size:11px;background:transparent;border:1px solid #2a7abf;color:#1a5c99;border-radius:4px;cursor:pointer}
.bs:hover{background:#ddeef8}
.bd{padding:1px 5px;font-size:10px;background:#fff0f0;border:1px solid #f09595;color:#a32d2d;border-radius:3px;cursor:pointer;margin-left:4px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#daeaf7;border-bottom:2px solid #a0c4e8}
thead th{vertical-align:bottom;text-align:center;padding:0;overflow:visible;white-space:nowrap}
thead th{vertical-align:bottom;text-align:center}
th{padding:7px 10px;text-align:left;font-weight:bold;color:#1a3a5c;font-size:11px}
tbody tr{border-bottom:1px solid #c8ddef}
tbody tr:nth-child(even){background:#f0f6fb}
tbody tr:hover{background:#daeaf7}
td{padding:6px 10px}
.card{background:#fff;border:1px solid #b8d4ec;border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,90,150,0.07)}
.cbody{padding:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold}
.ok{background:#d0ebd0;color:#1a5c1a}
.warn{background:#fce8c0;color:#7a4a00}
.exp{background:#fbd0d0;color:#7a1a1a}
.miss{background:#dde4ec;color:#3a5070}
.dot{width:16px;height:16px;border-radius:3px;display:inline-block}
.leg{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#4a6a88}
.av{width:42px;height:42px;border-radius:50%;background:#1a5c99;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:15px;color:#fff;flex-shrink:0}
.phdr{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border:1px solid #b8d4ec;border-radius:10px;margin-bottom:10px}
.bw{display:flex;align-items:center;gap:8px}
.bbg{flex:1;height:7px;background:#c8ddef;border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.ac{position:absolute;background:#fff;border:1px solid #a0c4e8;border-radius:6px;z-index:100;max-height:180px;overflow-y:auto;width:100%;top:100%;left:0;box-shadow:0 4px 12px rgba(26,90,150,0.15)}
.ac div{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #ddeef8}
.ac div:hover{background:#daeaf7}
.tsc{overflow-x:auto}
.inote{background:#ddeef8;border:1px solid #a0c4e8;border-radius:6px;padding:8px 12px;font-size:11px;color:#2a4a6a;margin-top:8px}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:860px}
.dash-name{cursor:pointer;color:#1a5c99;text-decoration:underline;font-weight:bold}
.dash-name:hover{color:#0d3d6e}
footer{text-align:center;padding:10px;font-size:10px;color:#7a9ab8;border-top:1px solid #c8ddef;margin-top:24px;background:#daeaf7}
@media(max-width:640px){.twocol{grid-template-columns:1fr}}

@media (max-width: 600px) {
  /* ── HEADER ── */
  #app-header > div:first-child {
    padding: 6px 10px;
    min-height: 48px;
  }
  #app-header > div:first-child span {
    font-size: 11px;
    padding: 0 6px;
  }
  #app-header > div:first-child img {
    height: 32px !important;
  }
  /* NAV buttons: wrap and scroll horizontally */
  #app-header > div:last-child {
    height: auto !important;
    padding: 4px 8px !important;
    gap: 4px !important;
    overflow-x: auto;
    flex-wrap: nowrap !important;
    -webkit-overflow-scrolling: touch;
  }
  #app-header button {
    padding: 5px 10px !important;
    font-size: 11px !important;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  main { padding: 8px !important; }
  h2 { font-size: 14px !important; margin-bottom: 8px !important; }

  /* ── DASHBOARD BANNER ── */
  #dash-banner {
    flex-direction: column !important;
    gap: 10px !important;
    padding: 10px 12px !important;
  }
  #dash-banner > div:nth-child(2) { display: none; } /* hide progress bar on mobile */

  /* ── FILTERS ── */
  .filters {
    flex-wrap: wrap;
    gap: 6px;
  }
  .filters input, .filters select {
    width: 100% !important;
    box-sizing: border-box;
  }

  /* ── DASHBOARD TABLE ──
     On mobile show only: #, Grado, Cognome Nome, status dots (scrollable) */
  .tsc {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tsc table {
    min-width: 700px !important;
    font-size: 10px !important;
  }

  /* ── CARDS ── */
  .card { border-radius: 6px; margin-bottom: 10px; }
  .cbody { padding: 10px !important; }

  /* ── INSERT FORM ── */
  #view-insert .card > .cbody > div[style*="grid"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* ── GESTIONE grid ── */
  #view-gestione > div {
    grid-template-columns: 1fr !important;
  }

  /* ── MODULO VIEW ── */
  #view-modulo .card table { font-size: 10px; }

  /* ── MODAL OVERLAY ── */
  #scheda-overlay > div {
    max-width: 100% !important;
    max-height: 95vh !important;
    border-radius: 8px !important;
  }
  #scheda-overlay table { font-size: 10px; }
  #scheda-overlay th, #scheda-overlay td { padding: 4px 5px !important; }

  /* ── STAMPA VIEW ── */
  #view-stampa table { font-size: 10px; }
  #view-stampa th, #view-stampa td { padding: 4px 5px; }

  /* ── PIANI DI LEZIONE ── */
  #view-piani .filters { flex-direction: column; }
  #view-piani .filters select,
  #view-piani .filters input { width: 100% !important; }

  /* ── FOOTER ── */
  footer { font-size: 9px !important; padding: 6px !important; }

  /* ── PRONTI OVERLAY ── */
  #pronti-overlay > div {
    width: 96% !important;
    max-height: 88vh !important;
  }
}
</style>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

      <div style="text-align:center;font-size:11px;color:#7a9ab8">Hai già un account? <span onclick="showLogin()" style="color:#1a5c99;cursor:pointer;text-decoration:underline">Accedi</span></div>

function gradeRank(grado) {
  var g = (grado||"").toLowerCase().trim();
  // Normalize common acronyms before matching
  var norm = g
    .replace(/^sma$/,"serg. magg. a.")
    .replace(/^s\.m\.a\.?$/,"serg. magg. a.")
    .replace(/^smc$/,"serg. magg. ca")
    .replace(/^s\.m\.c\.?$/,"serg. magg. ca")
    .replace(/^s\.m\.$/,"serg. magg.")
    .replace(/^1°\s?grd$/,"1° grd")
    .replace(/^1°\s?lgt$/,"1° lgt")
    .replace(/^1°\s?mar$/,"1° mar");
  var toCheck = [norm, g];
  for(var j=0;j<toCheck.length;j++) {
    var v=toCheck[j];
    for(var i=0;i<GRADE_ORDER.length;i++){
      if(v===GRADE_ORDER[i]) return i;
    }
    for(var i=0;i<GRADE_ORDER.length;i++){
      if(v.indexOf(GRADE_ORDER[i])===0) return i;
    }
  }
  return GRADE_ORDER.length;
}

function sortPersonnel(arr) {
  return arr.slice().sort(function(a,b){
    var ra=gradeRank(a.grado), rb=gradeRank(b.grado);
    if(ra!==rb) return ra-rb;
    var ca=a.cognome||"", cb=b.cognome||"";
    return ca.localeCompare(cb,"it");
  });
}

function addDays(d,n) {
  if(!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
  var dt = new Date(d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().split("T")[0];
}
function dd(d) {
  if(!d) return null;
  var dt=new Date(d), now=new Date(); now.setHours(0,0,0,0);
  return Math.round((dt-now)/86400000);
}
function fD(d) {
  if(!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return d||"\u2014";
  var p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0];
}
function luogo(s) { return(s&&s.luogo&&s.luogo.trim())?s.luogo.trim():"PINEROLO"; }
function today() { return new Date().toISOString().split("T")[0]; }
function todayIT() {
  var n=new Date(), mn=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  return n.getDate()+" "+mn[n.getMonth()]+" "+n.getFullYear();
}
function getExp(mod,last,fatsDate) {
  if(!last||!/^\d{4}-\d{2}-\d{2}$/.test(last)) return null;
  var cfg=MC[mod]; if(!cfg) return null;
  if(mod==="form_specifica") return last;
  if(mod==="idoneita") return last;
  if(mod==="pefo"||mod==="agilita") {
    var lastYear=parseInt(last.substring(0,4));
    return (lastYear+1)+"-12-31";
  }
  // Poligono ARX or PB: check if FATS extends validity
  if((mod==="poligono"||mod==="pb")&&fatsDate) {
    var polDate=new Date(last), fDate=new Date(fatsDate);
    var daysSincePol=Math.round((fDate-polDate)/86400000);
    // FATS valid only if done within 180 days of poligono
    if(daysSincePol>=0&&daysSincePol<=180) {
      return addDays(fatsDate, 180);
    }
  }
  return addDays(last, cfg.g);
}
function getSt(exp) {
  if(!exp) return "missing";
  var d=dd(exp); if(d===null) return "missing";
  if(d<0) return "expired"; if(d<=60) return "warning"; return "ok";
}
function buildPS() {
  var map={};
  for(var i=0;i<personnel.length;i++) {
    var p=personnel[i], ms={};
    // Get FATS sessions for this person
    var fatsArxSess=sessions.filter(function(x){return x.pid===p.id&&x.modulo==="fats_arx";}).sort(function(a,b){return b.data>a.data?1:-1;})[0];
    var fatsPbSess =sessions.filter(function(x){return x.pid===p.id&&x.modulo==="fats_pb"; }).sort(function(a,b){return b.data>a.data?1:-1;})[0];
    // Also check old 'fats' module for backward compatibility
    var fatsOld=sessions.filter(function(x){return x.pid===p.id&&x.modulo==="fats";}).sort(function(a,b){return b.data>a.data?1:-1;})[0];
    var fatsArxDate=fatsArxSess?fatsArxSess.data:(fatsOld?fatsOld.data:null);
    var fatsPbDate =fatsPbSess ?fatsPbSess.data :(fatsOld?fatsOld.data:null);

    var allMods = Object.keys(MC);
    for(var j=0;j<allMods.length;j++) {
      var mod=allMods[j];
      var s=sessions.filter(function(x){return x.pid===p.id&&x.modulo===mod;}).sort(function(a,b){return b.data>a.data?1:-1;});
      var lat=s[0]||null;
      var tot=s.reduce(function(a,x){return a+(x.periodi||1);},0);
      var fatsDate = mod==="poligono" ? fatsArxDate : (mod==="pb" ? fatsPbDate : null);
      var exp=getExp(mod,lat?lat.data:null,fatsDate);
      ms[mod]={lat:lat,exp:exp,st:getSt(exp),tot:tot,hist:s,fatsDate:fatsDate};
    }
    map[p.id]=ms;
  }
  return map;
}

  return '<div class="dot" style="background:'+bg[st]+';border:1px solid '+bg[st]+';margin:0 auto;display:block" title="'+title+'"></div>';
}
function pill(st) {
  var cls={ok:"ok",warning:"warn",expired:"exp",missing:"miss"};
  return '<span class="badge '+cls[st]+'">'+SL[st]+"</span>";
}
function pctSch(pid,PS) {
  var ms=PS[pid]||{}, done=0;
  var mods=MK.filter(function(m){return m!=="fats";});
  for(var i=0;i<mods.length;i++){var st=ms[mods[i]]&&ms[mods[i]].st;if(st==="ok"||st==="warning")done++;}
  return Math.round(done/mods.length*100);
}
function el(id){return document.getElementById(id);}
function val(id){var e=el(id);return e?e.value:"";}

var cv="dashboard";
function showView(v) {
  if(!_appReady && v!=="dashboard") return; // wait for data
  // Remove active from all nav buttons
  document.querySelectorAll("#app-header button, nav button").forEach(function(b){b.classList.remove("active");});
  // Show correct view, hide others
  document.querySelectorAll("main > div").forEach(function(d){d.style.display="none";});
  el("nav-"+v).classList.add("active");
  el("view-"+v).style.display="";
  cv=v;
  if(v==="insert"){var vi=el("view-insert");if(vi)vi.dataset.built="";}
  if(v==="dashboard"){
    var vd=el("view-dashboard");
    if(vd&&vd.dataset.built){_refreshDashRows(buildPS());_refreshDashBanner(buildPS());return;}
  }
  render(v);
}
function render(v) {
  var PS=buildPS();
  if(v==="dashboard") rDash(PS);
  else if(v==="insert") rIns();
  else if(v==="modulo") rMod(PS);
  else if(v==="stampa") rStp(PS);
  else if(v==="gestione") rGest();
  else if(v==="piani") rPiani();
  else if(v==="admin") rAdmin();
}

/* DASHBOARD */
function rDash(PS) {
  var viewEl = el("view-dashboard");

  // First call: build full layout once
  if(!viewEl.dataset.built) {
    _buildDashLayout(PS);
    viewEl.dataset.built = "1";
  } else {
    // Subsequent calls: only refresh rows + banner stats
    _refreshDashRows(PS);
    _refreshDashBanner(PS);
  }
}

  for(var i=0;i<personnel.length;i++){

    for(var j=0;j<schedaMods.length;j++){

  var totP = personnel.length;

    +'<div style="display:flex;align-items:baseline;gap:10px">'

    +'<span style="font-size:18px;color:'+col+'">/ '+totP+'</span>'

    +'</div></div>'
    +'<div style="flex:1;min-width:120px;max-width:300px">'
    +'<div style="height:12px;background:#c8ddef;border-radius:6px;overflow:hidden">'
    +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:6px"></div>'
    +'</div></div>'
    +'<button class="bp" onclick="showPronti()" style="font-size:12px;padding:5px 14px;white-space:nowrap">&#9654; Vedi lista pronti</button>'
    +'<button onclick="esportaExcel()" style="font-size:12px;padding:5px 14px;white-space:nowrap;background:#1a7a3a;color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:500">&#8595; Lenzuolone Excel</button>'

    +'<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#2a4a6a"><span style="width:13px;height:13px;border-radius:3px;background:#A32D2D;display:inline-block"></span>Scaduto</span>'

    +'</div>';
}

function _refreshDashRows(PS) {
  console.log("_refreshDashRows called, personnel:", personnel.length);
  var q   = (_qStore.dash||"").toLowerCase();
  var cpF = val("dash-cp")||"";
  var filt = personnel.filter(function(p){
    return (!cpF||p.cp===cpF) && (!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);
  });

  var tbody = document.getElementById("dash-tbody");
  if(!tbody) return;

  // Precompute global rank (position in full sorted list)
  var _sortedAll = sortPersonnel(personnel);
  var _rankMap = {};
  _sortedAll.forEach(function(p,i){ _rankMap[p.id] = i+1; });

  // Build rows HTML
  var rowsHtml = filt.map(function(p,i){
    var ms   = PS[p.id]||{};
    var dots = MK.map(function(m){
      var st=(ms[m]&&ms[m].st)||"missing";
      var ex=ms[m]&&ms[m].exp;
      return '<td style="padding:2px 0;text-align:center;width:31px;min-width:31px;max-width:31px">'+dot(st,MC[m].label+": "+SL[st]+(ex?" / "+fD(ex):""))+"</td>";
    }).join("");
    var tr = document.createElement("tr");
    tr.style.background = i%2===0 ? "transparent" : "#f0f6fb";
    var nameTd = document.createElement("td");
    nameTd.style.cssText = "padding:3px 8px;font-weight:bold;max-width:108px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:#1a5c99;text-decoration:underline";
    nameTd.dataset.pid = p.id;
    nameTd.className = "dash-name";
    nameTd.textContent = p.cognome+" "+p.nome;
    var printBtn = '<button class="bs" data-pid="'+p.id+'" title="Stampa scheda">&#128424;</button>';
    tr.innerHTML = '<td style="padding:3px 4px;font-size:10px;color:#aaa">'+(_rankMap[p.id]||i+1)+'</td>'
      +'<td style="padding:3px 4px;color:#3a5070">'+p.cp+'</td>'
      +'<td style="padding:3px 4px;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#3a5070">'+p.grado+"</td>"
      +"<NAMECELL></NAMECELL>"+dots
      +'<td style="padding:2px 3px;text-align:center">'+printBtn+"</td>";
    tr.querySelector("NAMECELL").replaceWith(nameTd);
    return tr.outerHTML;
  }).join("");

  tbody.innerHTML = rowsHtml;

  var countEl = document.getElementById("dash-count");
  if(countEl) countEl.textContent = filt.length+" militari";
}

function goToScheda(pid) {
  var p=null; for(var i=0;i<personnel.length;i++) if(personnel[i].id===pid){p=personnel[i];break;}
  if(!p) return;
  _buildSchedaOverlay(pid, null);
}

function _buildSchedaOverlay(pid, expandedMod) {
  var p=null; for(var i=0;i<personnel.length;i++) if(personnel[i].id===pid){p=personnel[i];break;}
  if(!p) return;

  var ex=document.getElementById("scheda-overlay"); if(ex) ex.remove();
  var PS=buildPS(); var ms=PS[pid]||{};

  var tbody = document.createElement("tbody");

  MK.forEach(function(mod, mIdx) {
    var m=ms[mod]||{};
    var lu=m.lat?(m.lat.luogo&&m.lat.luogo.trim()?m.lat.luogo.trim():"PINEROLO"):"--";
    var d=m.exp?dd(m.exp):null;
    var ds=d!==null?'<span style="font-size:10px;color:'+SC[m.st||"missing"]+'">'+(d<0?"-"+Math.abs(d):"+"+d)+"gg</span>":"";
    var cls={"ok":"ok","warning":"warn","expired":"exp","missing":"miss"}[m.st||"missing"];
    var isExpanded = (mod === expandedMod);

    var modSessions = sessions.filter(function(s){return s.pid===pid&&s.modulo===mod;})
      .sort(function(a,b){return b.data>a.data?1:-1;});

    var totPeriodi = modSessions.reduce(function(acc,s){return acc+(s.periodi||1);},0);
    var nSess = modSessions.length;
    var expandIcon = nSess>0 ? (isExpanded?"▾":"▸") : "";
    var sessLabel = nSess>0 ? nSess+" sess. / "+totPeriodi+" per." : "--";

    // Main module row
    var tr=document.createElement("tr");
    tr.style.background=mIdx%2===0?"transparent":"#f0f6fb";
    tr.style.cursor=nSess>0?"pointer":"default";
    tr.dataset.mod=mod; tr.dataset.pid=pid;
    tr.className="scheda-mod-row";
    var col1Label = mod==="idoneita" ? (m.lat?fD(m.lat.data):"--") : (m.lat?fD(m.lat.data):"--");
    var col1Style = mod==="idoneita" ? "padding:5px 8px;font-size:11px;font-family:monospace;color:#1a5c99;font-weight:bold" : "padding:5px 8px;font-size:11px;font-family:monospace";
    tr.innerHTML=
      '<td style="padding:5px 8px;font-weight:bold;font-size:12px;white-space:nowrap">'
        +'<span style="color:#5b9ec9;margin-right:4px;font-size:11px">'+expandIcon+'</span>'
        +MC[mod].label+'</td>'
      +'<td style="'+col1Style+'">'+col1Label+'</td>'
      +'<td style="padding:5px 8px;font-size:11px">'+lu+'</td>'
      +'<td style="padding:5px 8px;font-size:11px;text-align:center">'
        +'<span style="color:'+(nSess>0?"#1a5c99":"#aaa")+';font-weight:'+(nSess>0?"bold":"normal")+'">'+sessLabel+'</span>'
      +'</td>'
      +'<td style="padding:5px 8px;font-size:11px;font-family:monospace">'+(mod==="idoneita"?"<span style='color:#7a9ab8;font-size:10px;font-style:italic'>= data ins.</span>":(m.exp?fD(m.exp):"--")+" "+ds)+'</td>'
      +'<td style="padding:5px 8px"><span class="badge '+cls+'">'+SL[m.st||"missing"]+'</span></td>'
      +'<td style="padding:5px 4px;text-align:center;white-space:nowrap"></td>';

    var agBtn=document.createElement("button");
    agBtn.className="bp qa-trigger"; agBtn.dataset.pid=pid; agBtn.dataset.mod=mod;
    agBtn.style.cssText="font-size:10px;padding:3px 8px";
    agBtn.textContent="+ Aggiungi";
    agBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      var thisPid = this.dataset.pid;
      var thisMod = this.dataset.mod;
      var overlay = document.getElementById("scheda-overlay");
      if(overlay) overlay.remove();
      openQuickAdd(thisPid, thisMod);
    });
    tr.lastElementChild.appendChild(agBtn);


    // FATS button for poligono and pb
    if(mod==="poligono"||mod==="pb") {
      var fatsMod = mod==="poligono" ? "fats_arx" : "fats_pb";
      var polDate = m.lat ? new Date(m.lat.data) : null;
      var today2 = new Date();
      var daysSincePol = polDate ? Math.round((today2-polDate)/86400000) : 999;
      var fatsMs = ms[fatsMod]||{};
      var fatsLat2 = fatsMs.lat||null;
      var fatsUsed = fatsLat2 && polDate && new Date(fatsLat2.data) >= polDate;
      if(daysSincePol>=0 && daysSincePol<=180 && !fatsUsed) {
        var fatsBtn=document.createElement("button");
        fatsBtn.style.cssText="font-size:10px;padding:3px 8px;margin-left:4px;background:#e8f4ff;color:#1a5c99;border:1px solid #a0c4e8;border-radius:4px;cursor:pointer;font-weight:bold";
        fatsBtn.textContent="+ FATS";

            e.stopPropagation();
            var ov=document.getElementById("scheda-overlay");
            if(ov) ov.remove();
            openQuickAdd(pid, fm);

        })(mod, fatsMod);
        tr.lastElementChild.appendChild(fatsBtn);

        var fatsInfo=document.createElement("span");

        fatsInfo.textContent="✓ FATS: "+fD(fatsLat2.data);
        tr.lastElementChild.appendChild(fatsInfo);

        e.stopPropagation();
        if(e.target.closest(".qa-trigger") || e.target.closest(".del-sess-btn")) return;

      });
    })(mod, tr, nSess>0);

          +'<td style="padding:4px 8px;font-size:11px;color:#3a6a9a">'+luogoS+'</td>'
          +'<td style="padding:4px 8px;font-size:11px;text-align:center">'
            +'<span style="background:#daeaf7;color:#1a3a5c;border-radius:4px;padding:1px 7px;font-weight:bold">'+periodi+' per.</span>'
          +'</td>'
          +'<td colspan="2" style="padding:4px 8px;font-size:10px;color:#7a9ab8;font-style:italic">'

        delBtn.dataset.sessId=sess.id; delBtn.dataset.pid=pid; delBtn.dataset.mod=mod;

          if(!confirm("Eliminare questa sessione?")) return;

        str.lastElementChild.appendChild(delBtn);
        tbody.appendChild(str);
      });

      // Total row
      var totRow=document.createElement("tr");
      totRow.style.cssText="background:#d0eaf7;border-left:4px solid #1a5c99";
      totRow.innerHTML=
        '<td colspan="3" style="padding:3px 8px 3px 24px;font-size:11px;font-weight:bold;color:#1a3a5c">Totale</td>'
        +'<td style="padding:3px 8px;font-size:11px;text-align:center;font-weight:bold;color:#1a3a5c">'
          +nSess+' sessioni / '+totPeriodi+' periodi'
        +'</td>'
        +'<td colspan="3"></td>';
      tbody.appendChild(totRow);

      // Show FATS sessions if this is poligono or pb
      if(mod==="poligono"||mod==="pb") {
        var fatsMod2 = mod==="poligono"?"fats_arx":"fats_pb";

// Filter rows by show/hide - never touches innerHTML
function _rInsFilter() {
  var q   = (document.getElementById("ins-q").value || "").toLowerCase();
  var cpF = document.getElementById("ins-cp").value || "";
  var rows = document.getElementById("ins-list").querySelectorAll(".ins-row");
  rows.forEach(function(r){
    var nameMatch = !q   || r.dataset.name.indexOf(q) >= 0;
    var cpMatch   = !cpF || r.dataset.cp === cpF;
    r.style.display = (nameMatch && cpMatch) ? "" : "none";
  });
}

// Refresh checkboxes and counter - never touches input fields
function _rInsRefresh() {
  var rows = document.getElementById("ins-list").querySelectorAll(".ins-row");
  rows.forEach(function(r){
    var sel = iPids.indexOf(r.dataset.pid) >= 0;
    r.style.background = sel ? "#daeaf7" : "#fff";
    var chk = r.querySelector(".ins-chk");
    if(chk){
      chk.style.background = sel ? "#1a5c99" : "transparent";
      chk.style.borderColor = sel ? "#1a5c99" : "#ccc";
      chk.innerHTML = sel ? "&#10003;" : "";
    }
    var lbl = r.querySelector(".ins-lbl");
    if(lbl) lbl.style.fontWeight = sel ? "bold" : "normal";
  });
  var counter = document.getElementById("ins-counter");
  if(counter) counter.textContent = iPids.length + " selezionati";
}

function _rInsList() { _rInsRefresh(); }

function doIns(){
  if(!canEdit()){alert('Non hai i permessi per inserire dati.');return;}
  var mod=val("ins-mod"),data=val("ins-data"),lg=val("ins-luogo"),per=parseInt(val("ins-per"))||1;
  var pianoLink=(val("ins-piano-link")||"").trim();
  var pianoNote=(val("ins-piano-note")||"").trim();
  if(!mod||!data||iPids.length===0){alert("Seleziona modulo, data e almeno un militare.");return;}
  var n=iPids.length;
  var newSessions=[];
  for(var i=0;i<iPids.length;i++){
    var sess={id:nextId++,pid:iPids[i],modulo:mod,data:data,luogo:lg,periodi:per};
    sessions.push(sess); newSessions.push(sess);
  }
  var newPiano=null;
  if(pianoLink){
    var newPianoId=pianiData.length>0?Math.max.apply(null,pianiData.map(function(p){return p.id||0;}))+1:1;
    var luogoLabel=lg&&lg.trim()?lg.trim():"PINEROLO";
    var titolo=(MC[mod]?MC[mod].label:mod)+" - "+fD(data)+" - "+luogoLabel;
    newPiano={id:newPianoId,modulo:mod,data:data,titolo:titolo,link:pianoLink,note:pianoNote};
    pianiData.push(newPiano);
  }
  save(); iPids=[];
  // Async write to Supabase
  (async function(){
    try {
      for(var i=0;i<newSessions.length;i++) await sbPost("sessions", newSessions[i]);
      if(newPiano) await sbPost("piani", newPiano);
    } catch(e){ console.error("Supabase write error:", e); }
  })();
  var savedEl=document.getElementById("ins-saved");
  if(savedEl){savedEl.style.display="block";setTimeout(function(){savedEl.style.display="none";},2500);}
  rIns();
}

function rMod(PS){
  var mod=val("mod-sel")||"mcm", cpF=val("mod-cp");
  var cpL=[...new Set(personnel.map(function(p){return p.cp;}))].sort();
  var mO=MK.map(function(m){return'<option value="'+m+'"'+(mod===m?" selected":"")+">"+MC[m].label+"</option>";}).join("");
  var cpO=cpL.map(function(c){return'<option value="'+c+'"'+(cpF===c?" selected":"")+">CP "+c+"</option>";}).join("");
  var rows=personnel.filter(function(p){return!cpF||p.cp===cpF;}).map(function(p){var m=PS[p.id]&&PS[p.id][mod]||{};return{p:p,lat:m.lat,exp:m.exp,st:m.st||"missing",tot:m.tot||0};});
  rows.sort(function(a,b){var o={expired:0,missing:1,warning:2,ok:3};return(o[a.st]||0)-(o[b.st]||0);});
  var totP=sessions.filter(function(s){return s.modulo===mod;}).reduce(function(a,s){return a+(s.periodi||1);},0);

  var tb=rows.map(function(r,i){
    var d=r.exp?dd(r.exp):null,ds="";
    if(d!==null)ds='<span style="font-size:10px;color:'+SC[r.st||"missing"]+'">'+(d<0?"-"+Math.abs(d):"+"+d)+"gg</span>";
    return'<tr style="background:'+(i%2===0?"transparent":"#fafafa")+'"><td>'+r.p.cp+"</td><td>"+r.p.grado+'</td><td style="font-weight:bold">'+r.p.cognome+" "+r.p.nome+"</td><td style='font-family:monospace'>"+(r.lat?fD(r.lat.data):"--")+"</td><td>"+(r.lat?luogo(r.lat):"--")+"</td><td style='font-family:monospace'>"+(r.exp?fD(r.exp):"--")+" "+ds+"</td><td>"+pill(r.st||"missing")+"</td><td style='text-align:center'>"+(r.tot||"--")+"</td></tr>";
  }).join("");
  el("view-modulo").innerHTML="<h2>Situazione per modulo</h2>"
    +'<div class="filters"><select id="mod-sel" onchange="rMod(buildPS())">'+mO+'</select><select id="mod-cp" onchange="rMod(buildPS())"><option value="">Tutte CP</option>'+cpO+"</select></div>"
    +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">'
    +[["ok","Validi"],["warning","In scad."],["expired","Scaduti"],["missing","Mancanti"]].map(function(x){return'<div style="padding:10px;background:'+ST_BG[x[0]]+';border-radius:8px;border:1px solid '+SC[x[0]]+'44"><div style="font-size:10px;color:'+SC[x[0]]+';font-weight:bold">'+x[1]+'</div><div style="font-size:22px;font-weight:bold;color:'+SC[x[0]]+'">'+cnt[x[0]]+"</div></div>";}).join("")
    +'<div style="padding:10px;background:#daeaf7;border-radius:8px;border:1px solid #a0c4e8"><div style="font-size:10px;color:#2a4a6a;font-weight:bold">Tot. periodi</div><div style="font-size:22px;font-weight:bold">'+totP+"</div></div></div>"
    +'<div class="card"><table><thead><tr><th>CP</th><th>Grado</th><th>Cognome Nome</th><th>Ultima sessione</th><th>Luogo</th><th>Scade il</th><th>Stato</th><th>Periodi</th></tr></thead><tbody>'+tb+"</tbody></table></div>";
}

function doIns(){
  var mod=val("ins-mod"),data=val("ins-data"),lg=val("ins-luogo"),per=parseInt(val("ins-per"))||1;
  var pianoLink=(val("ins-piano-link")||"").trim();
  var pianoNote=(val("ins-piano-note")||"").trim();
  if(!mod||!data||iPids.length===0){alert("Seleziona modulo, data e almeno un militare.");return;}
  var newSessions=[];
  for(var i=0;i<iPids.length;i++){
    var sess={id:nextId++,pid:iPids[i],modulo:mod,data:data,luogo:lg,periodi:per};
    sessions.push(sess);newSessions.push(sess);
  }
  var newPiano=null;

    var newPianoId=pianiData.length>0?Math.max.apply(null,pianiData.map(function(p){return p.id||0;}))+1:1;

  if(savedEl){savedEl.style.display="block";setTimeout(function(){savedEl.style.display="none";},2500);}

}

function rStp(PS){
  var q=(_qStore.stp||"").toLowerCase(),cpF=val("stp-cp")||"";
  var cpL=[...new Set(personnel.map(function(p){return p.cp;}))].sort();
  var cpO=cpL.map(function(c){return'<option value="'+c+'"'+(cpF===c?" selected":"")+">CP "+c+"</option>";}).join("");
  var filt=personnel.filter(function(p){return(!cpF||p.cp===cpF)&&(!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);});
  filt=filt.slice().sort(function(a,b){
    var pa=pctSch(a.id,PS), pb=pctSch(b.id,PS);
    if(pb!==pa) return pb-pa;
    var ra=gradeRank(a.grado), rb=gradeRank(b.grado);
    if(ra!==rb) return ra-rb;
    return (a.cognome||"").localeCompare(b.cognome||"","it");
  });
  var tb=filt.map(function(p,i){
    var pc=pctSch(p.id,PS),col=pc===100?"#639922":pc>=60?"#BA7517":"#A32D2D";
    var compl=pc===100?'<span class="badge ok" style="margin-left:6px">Completo</span>':"";
    var tr=document.createElement("tr");
    tr.style.background=i%2===0?"transparent":"#f0f6fb";
    tr.innerHTML='<td>'+p.cp+"</td><td>"+p.grado+'</td>'
      +'<td><span class="stp-name" data-pid="'+p.id+'" style="font-weight:bold;cursor:pointer;color:#1a5c99;text-decoration:underline">'+p.cognome+" "+p.nome+"</span></td>"
      +'<td><div class="bw"><div class="bbg"><div class="bfill" style="width:'+pc+'%;background:'+col+'"></div></div>'
      +'<span style="font-size:11px;font-weight:bold;color:'+col+';min-width:32px">'+pc+"%</span>"+compl+"</div></td>"
      +'<td><button class="bp stp-print" data-pid="'+p.id+'" style="white-space:nowrap">&#128424;Stampa</button></td>';
    return tr.outerHTML;
  }).join("");
  var nPronti=personnel.filter(function(p){var ms=PS[p.id]||{},ok=true;SCHEDA.forEach(function(r){var st=ms[r.mod]&&ms[r.mod].st;if(st!=="ok"&&st!=="warning")ok=false;});return ok;}).length;
  var _nPronti=personnel.filter(function(p){var ms=PS[p.id]||{},ok=true;SCHEDA.forEach(function(r){var st=ms[r.mod]&&ms[r.mod].st;if(st!=="ok"&&st!=="warning")ok=false;});return ok;}).length;
  el("view-stampa").innerHTML="<h2>Stampa scheda di approntamento</h2>"
    
    +'<p style="color:#4a6a88;margin-bottom:12px;font-size:13px">Genera la scheda ufficiale pre-compilata. Luogo non specificato = <b>PINEROLO</b>.</p>'
    +'<div style="margin-bottom:14px"><button id="btn-print-all" class="bp" style="background:#639922;border-color:#4a7518;font-size:13px;padding:8px 20px">&#128424;Stampa tutte le schede pronti ('+nPronti+')</button></div>'
    +'<div class="filters"><input id="stp-q" placeholder="Cerca cognome..." style="width:190px"><select id="stp-cp"><option value="">Tutte CP</option>'+cpO+"</select></div>"
    +'<div class="card" id="stp-table-card"><table><thead><tr><th>CP</th><th>Grado</th><th>Cognome Nome</th><th>Completamento scheda</th><th></th></tr></thead><tbody>'+tb+"</tbody></table></div>";
  _bindSearch("stp-q","stp",function(){rStp(buildPS());});
  _bindSelect("stp-cp",function(){rStp(buildPS());});
  var btnAll=document.getElementById("btn-print-all");
  if(btnAll) btnAll.addEventListener("click",function(){openPrintAll(buildPS());});
  var stpCard=document.getElementById("stp-table-card");
  if(stpCard)stpCard.addEventListener("click",function(e){
    var nm=e.target.closest(".stp-name");if(nm){goToScheda(nm.dataset.pid);return;}
    var pr=e.target.closest(".stp-print");if(pr){openPrint(pr.dataset.pid);return;}
  });
}

function addPiano(){
  var mod=val("piani-mod"),data=val("piani-data"),titolo=(val("piani-titolo")||"").trim();
  var link=(val("piani-link")||"").trim(),note=(val("piani-note")||"").trim();

  var newId=pianiData.length>0?Math.max.apply(null,pianiData.map(function(p){return p.id||0;}))+1:1;

  rPiani();
}

    var row=e.target.closest(".gest-row");
    if(!row)return;
    var pid=row.dataset.pid,idx=delIds.indexOf(pid);
    if(idx>=0)delIds.splice(idx,1);else delIds.push(pid);
    window._gestDelIds=delIds;rGest();
  });
  var qEl=document.getElementById("gest-filter-q");
  var cpEl=document.getElementById("gest-filter-cp");
  if(qEl){qEl.value=_qStore.gestQ||"";if(!qEl.dataset.bound){qEl.dataset.bound="1";qEl.addEventListener("input",function(){_qStore.gestQ=this.value;rGest();});}}
  if(cpEl&&!cpEl.dataset.bound){cpEl.dataset.bound="1";cpEl.addEventListener("change",function(){rGest();});}
}
function gestSelAll(){
  var cpF=(document.getElementById("gest-filter-cp")&&document.getElementById("gest-filter-cp").value)||"";
  var q=(_qStore.gestQ||"").toLowerCase();
  window._gestDelIds=personnel.filter(function(p){return(!cpF||p.cp===cpF)&&(!q||(p.cognome+" "+p.nome).toLowerCase().indexOf(q)>=0);}).map(function(p){return p.id;});
  rGest();
}
function gestSelNone(){window._gestDelIds=[];rGest();}
function gestDelSelected(){
  var delIds=window._gestDelIds||[];
  if(delIds.length===0)return;
  var names=delIds.map(function(id){var p=personnel.find(function(x){return x.id===id;});return p?p.grado+" "+p.cognome+" "+p.nome:"";}).join("\n");
  if(!confirm("Eliminare definitivamente "+delIds.length+" militare/i?\n\n"+names+"\n\nATTENZIONE: verranno eliminate anche tutte le sessioni associate."))return;
  var toDelete=delIds.slice();
  personnel=personnel.filter(function(p){return toDelete.indexOf(p.id)<0;});
  sessions=sessions.filter(function(s){return toDelete.indexOf(s.pid)<0;});
  window._gestDelIds=[];save();
  (async function(){try{for(var i=0;i<toDelete.length;i++){await sbDelete("sessions","pid=eq."+toDelete[i]);await sbDelete("personnel","id=eq."+toDelete[i]);}}catch(e){console.error("SB error:",e);}})();
  rGest();
}
function addP(){
  if(!canEdit()){alert('Non hai i permessi per modificare i dati.');return;}
  var cog=(val("gcog")||"").trim().toUpperCase(),nom=(val("gnom")||"").trim(),gra=(val("ggra")||"").trim(),cp=(val("gcp")||"36").trim(),pos=(val("gpos")||"").trim(),pl=(val("gpl")||"").trim();
  if(!cog||!nom||!gra){alert("Cognome, nome e grado sono obbligatori.");return;}
  var nId=String(Math.max.apply(null,personnel.map(function(x){return Number(x.id)||0;}))+1);
  var newP={id:nId,cp:cp,grado:gra,cognome:cog,nome:nom,pl:pl,posizione:pos};
  personnel.push(newP); personnel=sortPersonnel(personnel); save();
  (async function(){try{await sbPost("personnel",newP);}catch(e){console.error("SB error:",e);}})();
  alert("Militare aggiunto.");rGest();
}

function quickAddSave(pid,mod){
  var dataRaw=((document.getElementById("qa-data")||{}).value||"").trim();
  var luogoV=(document.getElementById("qa-luogo")||{}).value||"";
  var per=parseInt((document.getElementById("qa-per")||{}).value)||1;
  if(!dataRaw){alert("Inserisci la data.");return;}
  var data="";
  var mIT=dataRaw.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  var mISO=dataRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(mIT)data=mIT[3]+"-"+("0"+mIT[2]).slice(-2)+"-"+("0"+mIT[1]).slice(-2);
  else if(mISO)data=dataRaw;
  else{alert("Formato data non valido. Usa gg/mm/aaaa");return;}
  var dt=new Date(data);if(isNaN(dt.getTime())){alert("Data non valida.");return;}
  var qSess={id:nextId++,pid:pid,modulo:mod,data:data,luogo:luogoV,periodi:per};
  sessions.push(qSess);save();
  (async function(){try{await sbPost("sessions",qSess);}catch(e){console.error("SB error:",e);}})();
  var modal=document.getElementById("qa-modal");if(modal)modal.remove();
  // Refresh the scheda overlay if open
  var overlay=document.getElementById("scheda-overlay");if(overlay){overlay.remove();goToScheda(pid);}
  _refreshDashBanner(buildPS());_refreshDashRows(buildPS());
}

function esportaExcel() {
  var PS = buildPS();
  var today = new Date();
  var todayStr = ("0"+today.getDate()).slice(-2)+"/"+("0"+(today.getMonth()+1)).slice(-2)+"/"+today.getFullYear();

  var sorted = sortPersonnel(personnel);

  function fmtDate(d) {
    if(!d) return ""; var pp=d.split("-");
    return pp.length===3 ? pp[2]+"/"+pp[1]+"/"+pp[0] : d;
  }
  function getLatest(pid, mod) {
    return sessions.filter(function(s){ return s.pid===pid && s.modulo===mod; })
      .sort(function(a,b){ return b.data>a.data?1:-1; })[0] || null;
  }

  // Status colors
  var BG  = {ok:"#C8E6C9", warning:"#FFF9C4", expired:"#FFCDD2", missing:"#ECEFF1"};
  var FG  = {ok:"#1B5E20", warning:"#E65100", expired:"#B71C1C", missing:"#546E7A"};

  // Build HTML table
  var th = function(txt, style) {
    return '<th style="'+style+'">'+txt+'</th>';
  };
  var td = function(txt, style) {
    return '<td style="'+style+'">'+txt+'</td>';
  };

  var BASE_HDR = "background:#1A3A5C;color:#fff;font-weight:bold;font-family:Arial;font-size:9pt;text-align:center;border:1px solid #0F2A44;padding:4px 6px;white-space:nowrap;vertical-align:bottom";
  var SUB_HDR  = "background:#BDD9EF;color:#1A3A5C;font-weight:bold;font-family:Arial;font-size:8pt;text-align:center;border:1px solid #7AAED0;padding:3px 4px";
  var FIX_HDR  = "background:#1E5080;color:#fff;font-weight:bold;font-family:Arial;font-size:9pt;text-align:center;border:1px solid #0F2A44;padding:4px 6px";

  // Title row
  var totalCols = 4 + MK.length * 2;
  var html = '<table border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse;font-family:Arial;font-size:9pt">';

  // Row 1: Title
  html += '<tr><td colspan="'+totalCols+'" style="background:#1A3A5C;color:#fff;font-weight:bold;font-size:13pt;text-align:center;padding:8px;border:2px solid #0F2A44">LENZUOLO PERENNE &mdash; 3&deg; REGGIMENTO ALPINI &mdash; 36^ Cp &mdash; '+todayStr+'</td></tr>';

  // Row 2: fixed headers (rowspan=2) + module names (colspan=2 each)
  html += '<tr>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:35px">N&deg;</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:55px">CP</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:90px">GRADO</th>';
  html += '<th rowspan="2" style="'+FIX_HDR+';width:200px;text-align:left;padding-left:8px">COGNOME E NOME</th>';
  MK.forEach(function(m) {
    html += '<th colspan="2" style="'+BASE_HDR+';min-width:90px"><div style="writing-mode:vertical-lr;transform:rotate(180deg);height:70px;font-size:8pt;display:inline-block;line-height:1.2">'+MC[m].label+'</div></th>';
  });
  html += '</tr>';

  // Row 3: LUOGO/DATA sub-headers
  html += '<tr>';
  MK.forEach(function() {
    html += '<th style="'+SUB_HDR+'">Luogo</th>';
    html += '<th style="'+SUB_HDR+'">Data</th>';
  });
  html += '</tr>';

  // Data rows
  sorted.forEach(function(p, ri) {
    var ms = PS[p.id] || {};
    var bg = ri%2===0 ? "#FFFFFF" : "#EBF5FB";
    html += '<tr style="background:'+bg+'">';
    html += td(ri+1, "font-family:Arial;font-size:9pt;text-align:center;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td("CP "+p.cp, "font-family:Arial;font-size:9pt;text-align:center;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td(p.grado, "font-family:Arial;font-size:9pt;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    html += td(p.cognome+" "+p.nome, "font-family:Arial;font-size:9pt;font-weight:bold;border:1px solid #B0C8DC;padding:3px 5px;background:"+bg);
    MK.forEach(function(mod) {
      var s   = getLatest(p.id, mod);
      var st  = (ms[mod]&&ms[mod].st)||"missing";
      var cbg = BG[st], cfg = FG[st];
      var luogo = s ? (s.luogo&&s.luogo.trim()?s.luogo.trim():"PINEROLO") : "";
      var data  = s ? fmtDate(s.data) : "";
      var cell  = "font-family:Arial;font-size:8pt;text-align:center;border:1px solid #B0C8DC;padding:3px 4px;background:"+cbg+";color:"+cfg;
      html += td(luogo, cell);
      html += td(data, cell+(data?";font-weight:bold":""));
    });
    html += '</tr>';
  });

  // Legend row
  html += '<tr>';
  html += '<td colspan="2" style="padding:4px;border:none"></td>';
  html += '<td style="font-family:Arial;font-size:9pt;font-weight:bold;padding:5px 8px;border:1px solid #ccc">LEGENDA:</td>';
  [["#C8E6C9","#1B5E20","Valido"],["#FFF9C4","#E65100","In scad. \u226460gg"],["#FFCDD2","#B71C1C","Scaduto"],["#ECEFF1","#546E7A","Non effettuato"]].forEach(function(l){
    html += '<td colspan="2" style="background:'+l[0]+';color:'+l[1]+';font-family:Arial;font-size:9pt;font-weight:bold;text-align:center;border:1px solid #ccc;padding:4px 8px">'+l[2]+'</td>';
  });
  html += '<td colspan="'+(totalCols-10)+'" style="border:none"></td></tr>';

  html += '</table>';

  // Create downloadable .xls file (Excel reads HTML tables natively)
  var blob = new Blob([
    '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">',
    '<head><meta charset="UTF-8">',
    '<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>',
    '<x:Name>Lenzuolo Perenne</x:Name>',
    '<x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>',
    '</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->',
    '</head><body>',
    html,
    '</body></html>'
  ], {type: "application/vnd.ms-excel;charset=utf-8"});

  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "LENZUOLONE EXCEL.xls";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function _openEditModal(pid) {

  if(!p) return;

  var ex=document.getElementById("edit-modal-overlay"); if(ex) ex.remove();

  var overlay=document.createElement("div");
  overlay.id="edit-modal-overlay";
  overlay.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,40,80,0.65);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box";

  var box=document.createElement("div");
  box.style.cssText="background:#fff;border-radius:12px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 8px 32px rgba(10,40,80,0.35)";

  var hdr=document.createElement("div");
  hdr.style.cssText="background:#1a3a5c;padding:12px 18px;color:#fff;font-weight:bold;font-size:14px";
  hdr.textContent="Modifica — "+p.grado+" "+p.cognome+" "+p.nome;

  var body=document.createElement("div");
  body.style.cssText="padding:18px";

  body.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Cognome</label>'
    +'<input id="edit-cognome" value="'+(p.cognome||"")+'" style="width:100%"></div>'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Nome</label>'
    +'<input id="edit-nome" value="'+(p.nome||"")+'" style="width:100%"></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Grado</label>'
    +'<input id="edit-grado" value="'+(p.grado||"")+'" style="width:100%"></div>'
    +'<div><label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">CP</label>'
    +'<input id="edit-cp" value="'+(p.cp||"")+'" style="width:100%"></div>'
    +'</div>'
    +'<label style="font-size:11px;color:#3a6a9a;display:block;margin-bottom:3px">Nota</label>'
    +'<textarea id="edit-nota" rows="3" style="width:100%;margin-bottom:16px;resize:vertical;font-family:Arial;font-size:13px;padding:6px;border:1px solid #c8ddef;border-radius:5px">'+(p.nota||"")+'</textarea>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="edit-save" style="flex:1;padding:9px;font-size:13px;font-weight:bold;background:#1a5c99;color:#fff;border:none;border-radius:6px;cursor:pointer">&#10003; Salva</button>'
    +'<button id="edit-cancel" style="padding:9px 16px;font-size:13px;background:#f0f0f0;color:#333;border:none;border-radius:6px;cursor:pointer">Annulla</button>'
    +'</div>';

  box.appendChild(hdr); box.appendChild(body);
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  document.getElementById("edit-cancel").addEventListener("click",function(){overlay.remove();});
  overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove();});

  document.getElementById("edit-save").addEventListener("click",function(){
    var newCognome = (document.getElementById("edit-cognome").value||"").trim().toUpperCase();
    var newNome  = (document.getElementById("edit-nome").value||"").trim();
    var newCp    = (document.getElementById("edit-cp").value||"").trim();
    var newGrado = (document.getElementById("edit-grado").value||"").trim();
    var newNota  = (document.getElementById("edit-nota").value||"").trim();
    if(!newCognome||!newNome||!newCp||!newGrado){alert("Tutti i campi sono obbligatori tranne la nota.");return;}

    // Update local
    p.cognome=newCognome; p.nome=newNome; p.cp=newCp; p.grado=newGrado; p.nota=newNota;
    personnel=sortPersonnel(personnel);
    save();

    // Update Supabase
    (async function(){
      try{
        await sbPatch("personnel",p.id,{cognome:newCognome,nome:newNome,cp:newCp,grado:newGrado,nota:newNota});
      }catch(e2){console.error("SB patch error:",e2);}
    })();

    overlay.remove();
    // Refresh dashboard and reopen scheda modal
    var vd=document.getElementById("view-dashboard");
    if(vd&&vd.dataset.built){_refreshDashRows(buildPS());_refreshDashBanner(buildPS());}
    _buildSchedaOverlay(pid, null);
  });
}

// ===== SUPABASE AUTH =====
var _supabase = null;
var _currentUser = null;
var _currentRole = null;

function getSupabaseClient() {
  if (!_supabase) {
    _supabase = supabase.createClient(SB_URL, SB_KEY);
  }
  return _supabase;
}

function showLogin() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('register-form').style.display = 'none';
}

function showRegister() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('register-form').style.display = 'block';
}

function showAuthError(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  var email = (document.getElementById('auth-email').value || '').trim();
  var password = document.getElementById('auth-password').value || '';
  document.getElementById('auth-error').style.display = 'none';
  if (!email || !password) { showAuthError('auth-error', 'Inserisci email e password.'); return; }
  var btn = document.getElementById('btn-login');
  btn.textContent = 'Accesso in corso...'; btn.disabled = true;
  try {
    var sb = getSupabaseClient();
    var res = await sb.auth.signInWithPassword({ email: email, password: password });
    if (res.error) { showAuthError('auth-error', res.error.message); btn.textContent = 'Accedi'; btn.disabled = false; return; }
    await onLoginSuccess(res.data.user);
  } catch(e) {
    showAuthError('auth-error', 'Errore di connessione.'); btn.textContent = 'Accedi'; btn.disabled = false;
  }
}

async function doRegister() {
  var name = (document.getElementById('reg-name').value || '').trim();
  var email = (document.getElementById('reg-email').value || '').trim();
  var password = document.getElementById('reg-password').value || '';
  document.getElementById('reg-error').style.display = 'none';
  document.getElementById('reg-success').style.display = 'none';
  if (!name || !email || !password) { showAuthError('reg-error', 'Tutti i campi sono obbligatori.'); return; }
  if (password.length < 6) { showAuthError('reg-error', 'La password deve essere di almeno 6 caratteri.'); return; }
  try {
    var sb = getSupabaseClient();
    var res = await sb.auth.signUp({ email: email, password: password, options: { data: { full_name: name } } });
    if (res.error) { showAuthError('reg-error', res.error.message); return; }
    // Crea profilo manualmente (nessun trigger)
    var uid = res.data.user.id;
    await fetch(SB_URL + '/rest/v1/profiles', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ id: uid, full_name: name, role: 'viewer' })
    });
    var ok = document.getElementById('reg-success');
    ok.textContent = 'Account creato. Accedi con le tue credenziali.';
    ok.style.display = 'block';
    setTimeout(function() { showLogin(); }, 2000);
  } catch(e) {
    showAuthError('reg-error', 'Errore durante la registrazione.');
  }
}

async function onLoginSuccess(user) {
  _currentUser = user;
  // Recupera ruolo
  try {
    var sb = getSupabaseClient();
    var res = await sb.from('profiles').select('role, full_name').eq('id', user.id).single();
    _currentRole = (res.data && res.data.role) ? res.data.role : 'viewer';
  } catch(e) {
    _currentRole = 'viewer';
  }
  // Aggiorna UI
  document.getElementById('nav-user-email').textContent = user.email;
  var roleColors = { admin: '#e8a020', editor: '#639922', viewer: '#5b9ec9' };
  var roleEl = document.getElementById('nav-user-role');
  roleEl.textContent = _currentRole.toUpperCase();
  roleEl.style.background = roleColors[_currentRole] || '#888';
  roleEl.style.color = '#fff';
  // Mostra/nascondi pulsante admin
  if (_currentRole === 'admin') {
    document.getElementById('nav-admin').style.display = '';
  }
  // Nascondi login, mostra app
  document.getElementById('login-screen').style.display = 'none';
  // Carica dati
  loadFromSupabase();
}

async function doLogout() {
  if (!confirm('Vuoi uscire?')) return;
  var sb = getSupabaseClient();
  await sb.auth.signOut();
  _currentUser = null; _currentRole = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('nav-admin').style.display = 'none';
  document.getElementById('nav-user-email').textContent = '';
  document.getElementById('nav-user-role').textContent = '';
  // Reset app state
  personnel = []; sessions = []; pianiData = [];
  var vd = document.getElementById('view-dashboard'); if(vd) vd.dataset.built = '';
  showLoading(true);
}

function canEdit() {
  return _currentRole === 'admin' || _currentRole === 'editor';
}

// ===== PANNELLO ADMIN =====
async function rAdmin() {
  var sb = getSupabaseClient();
  var res = await sb.from('profiles').select('id, full_name, role');
  var users = (res.data || []);
  // Recupera email da auth (solo admin può fare questo via service role — usiamo quello che abbiamo)
  var rows = users.map(function(u, i) {
    var roleOpts = ['viewer','editor','admin'].map(function(r) {
      return '<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+r+'</option>';
    }).join('');
    return '<tr style="background:'+(i%2===0?'transparent':'#f0f6fb')+'">'
      +'<td style="padding:6px 10px;font-size:12px;font-family:monospace;color:#4a6a88">'+u.id.substring(0,8)+'...</td>'
      +'<td style="padding:6px 10px;font-size:12px">'+(u.full_name||'—')+'</td>'
      +'<td style="padding:6px 10px">'
      +'<select onchange="changeRole(\''+u.id+'\',this.value)" style="font-size:12px;padding:3px 6px;border:1px solid #c8ddef;border-radius:4px">'+roleOpts+'</select>'
      +'</td></tr>';
  }).join('') || '<tr><td colspan="3" style="text-align:center;padding:20px;color:#aaa">Nessun utente registrato.</td></tr>';

  document.getElementById('view-admin').innerHTML =
    '<h2>&#9881; Gestione Accessi</h2>'
    +'<p style="font-size:12px;color:#4a6a88;margin-bottom:14px">Modifica i ruoli degli utenti registrati. Le modifiche sono immediate.</p>'
    +'<div class="card"><table><thead><tr>'
    +'<th>ID</th><th>Nome</th><th>Ruolo</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div id="admin-msg" style="display:none;margin-top:10px;padding:8px 12px;border-radius:6px;font-size:12px"></div>';
}

async function changeRole(uid, newRole) {
  var sb = getSupabaseClient();
  var res = await sb.from('profiles').update({ role: newRole }).eq('id', uid);
  var msg = document.getElementById('admin-msg');
  if (res.error) {
    msg.textContent = 'Errore: ' + res.error.message;
    msg.style.background = '#fff0f0'; msg.style.color = '#a32d2d';
  } else {
    msg.textContent = 'Ruolo aggiornato.';
    msg.style.background = '#f0fff0'; msg.style.color = '#1a5c1a';
  }
  msg.style.display = 'block';
  setTimeout(function(){ msg.style.display = 'none'; }, 2500);
}

// ===== INIT AUTH =====
async function initAuth() {
  var sb = getSupabaseClient();
  // Controlla se c'è già una sessione attiva
  var res = await sb.auth.getSession();
  if (res.data && res.data.session && res.data.session.user) {
    await onLoginSuccess(res.data.session.user);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    showLoading(false);
    document.querySelector('main').style.display = 'none';
  }
}

initAuth();
